function tryReadGujaratiProgress() {
    // Try reading Gujarati module's progress from localStorage
    const guijKeys = ['gujarati_progress_krish', 'gujarati_krish', 'gujarati_state'];
    for (const key of guijKeys) {
        try {
            const raw = localStorage.getItem(key);
            if (raw) {
                const data = JSON.parse(raw);
                if (data.currentPhase)  state.gujarati.phase  = data.currentPhase;
                if (data.currentLesson) state.gujarati.lesson = data.currentLesson;
                break;
            }
        } catch(e) {}
    }
}

function startGujaratiTimer() {
    state.gujarati.timerRunning = true;
    state.gujarati.timerStart   = Date.now();
    saveState();
    renderGujaratiPanel();
}

function stopGujaratiTimer() {
    if (state.gujarati.timerRunning && state.gujarati.timerStart) {
        const elapsed = Math.floor((Date.now() - state.gujarati.timerStart) / 60000);
        state.gujarati.todayMinutes += elapsed;
        if (elapsed >= 5) { addPoints(elapsed * 2); playTick(); }
    }
    state.gujarati.timerRunning = false;
    state.gujarati.timerStart   = null;
    clearInterval(_gujaratiTimerInterval);
    _gujaratiTimerInterval = null;
    saveState();
    renderGujaratiPanel();
    renderDashboard();
}

function resetGujaratiTimer() {
    stopGujaratiTimer();
    state.gujarati.todayMinutes = 0;
    state.gujarati.timerRunning = false;
    state.gujarati.timerStart   = null;
    saveState();
    renderGujaratiPanel();
}

function startGujaratiLiveUpdate() {
    clearInterval(_gujaratiTimerInterval);
    _gujaratiTimerInterval = setInterval(() => {
        if (!state.gujarati.timerRunning || !state.gujarati.timerStart) return;
        const totalSecs = state.gujarati.todayMinutes * 60 + Math.floor((Date.now() - state.gujarati.timerStart) / 1000);
        const m = String(Math.floor(totalSecs / 60)).padStart(2,'0');
        const s = String(totalSecs % 60).padStart(2,'0');
        const el = document.getElementById('guj-timer-display');
        if (el) el.textContent = m + ':' + s;
    }, 1000);
}

// ═══════════════════════════════════════════════════
//  CALENDAR PANEL
// ═══════════════════════════════════════════════════
function renderCalendarPanel() {
    const today = todayStr();
    const events = [...state.calendar.events]
        .filter(e => e.date >= today)
        .sort((a, b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time));

    let html = `
        <div class="sec-hdr"><div class="sec-title">📅 Calendar Events</div></div>

        <div class="cal-add-form">
            <div class="lbl" style="font-size:1em;font-weight:800;color:var(--dark);margin-bottom:12px">Add Event</div>
            <div class="form-row">
                <input class="f-input" id="ev-title" placeholder="Event name..." />
            </div>
            <div class="form-row">
                <input class="f-input" id="ev-date" type="date" value="${today}" min="${today}" />
                <input class="f-input" id="ev-time" type="time" value="09:00" />
            </div>
            <div class="form-row">
                <select class="f-select" id="ev-type">
                    ${Object.keys(EVENT_COLORS).map(t => `<option>${t}</option>`).join('')}
                </select>
                <button class="btn-add" onclick="addEvent()">+ Add</button>
            </div>
        </div>
    `;

    if (events.length === 0) {
        html += `<div class="empty-state"><div class="empty-ico">📅</div><div class="empty-txt">No upcoming events</div></div>`;
    } else {
        let currentGroup = '';
        events.forEach(ev => {
            const isToday = ev.date === today;
            const group   = isToday ? 'Today' : formatDate(ev.date);
            if (group !== currentGroup) {
                html += `<div style="font-size:0.82em;font-weight:800;color:var(--mid);text-transform:uppercase;letter-spacing:0.5px;margin:14px 0 7px">${group}</div>`;
                currentGroup = group;
            }
            html += `<div class="event-item">
                <div class="ev-date-block">
                    <div class="ev-day">${getDayNum(ev.date)}</div>
                    <div class="ev-month">${getMonthLabel(ev.date)}</div>
                </div>
                <div class="ev-dot" style="background:${ev.color}"></div>
                <div class="ev-info">
                    <div class="ev-title">${ev.title}</div>
                    <div class="ev-time">${ev.type} · ${ev.time}</div>
                </div>
                ${isToday ? '<div class="ev-today-badge">TODAY</div>' : ''}
            </div>`;
        });
    }

    document.getElementById('panel-calendar').innerHTML = html;
}

function addEvent() {
    const title = document.getElementById('ev-title')?.value?.trim();
    const date  = document.getElementById('ev-date')?.value;
    const time  = document.getElementById('ev-time')?.value;
    const type  = document.getElementById('ev-type')?.value || 'Other';
    if (!title || !date) {
        const el = document.getElementById('ev-title');
        if (el) { el.classList.add('shake'); setTimeout(()=>el.classList.remove('shake'),400); }
        return;
    }
    const fmt = time ? new Date('2000-01-01T' + time).toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' }) : '';
    state.calendar.events.push({ id: uid(), title, date, time: fmt, type, color: EVENT_COLORS[type] || EVENT_COLORS.Other });
    saveState();
    renderCalendarPanel();
    renderDashboard();
}

// ═══════════════════════════════════════════════════
//  HABITS PANEL
// ═══════════════════════════════════════════════════
const HABIT_CONFIG = {
    meditate: { icon:'🧘', name:'Meditate',   goal:'5 out of 7 days',  pts:10 },
    pullups:  { icon:'💪', name:'Pull-ups',    goal:'5 out of 7 days',  pts:8  },
    water:    { icon:'💧', name:'Drink Water', goal:'5 out of 7 days',  pts:6  },
};

function renderHabitsPanel() {
    const today    = todayStr();
    const weekDays = getWeekDayGrid();
    const todayIdx = weekDays.indexOf(today);
    const dayLabels = ['M','T','W','T','F','S','S'];

    let html = `<div class="sec-hdr"><div>
        <div class="sec-title">💪 Weekly Habits</div>
        <div class="sec-sub">Goal: 5 out of 7 days for each habit</div>
    </div></div>`;

    Object.entries(HABIT_CONFIG).forEach(([key, cfg]) => {
        const habit = state.habits[key];
        const weekDone = habit.weekDays.length;

        html += `<div class="habit-card">
            <div class="habit-hdr">
                <span class="habit-ico">${cfg.icon}</span>
                <div class="habit-info">
                    <div class="habit-name">${cfg.name}</div>
                    <div class="habit-goal-lbl">${weekDone}/${cfg.goal} · ${cfg.pts}pts/day</div>
                </div>
                <div class="streak-chip">🔥 ${habit.streak} days</div>
            </div>

            <div class="habit-week">
                ${weekDays.map((d, i) => {
                    const isDone   = habit.weekDays.includes(d);
                    const isToday  = d === today;
                    const isFuture = i > todayIdx && todayIdx !== -1;
                    return `<div class="hday ${isDone ? 'done' : ''} ${isToday ? 'today' : ''} ${isFuture ? 'future' : ''}"
                        onclick="toggleHabitDay('${key}','${d}')">
                        <span class="hday-lbl">${dayLabels[i]}</span>
                        <span class="hday-chk">${isDone ? '✓' : ''}</span>
                    </div>`;
                }).join('')}
            </div>`;

        // Extra controls per habit
        if (key === 'pullups') {
            html += `<div class="habit-counter">
                <span class="cntr-lbl">Today's count</span>
                <button class="cntr-btn" onclick="adjustPullups(-1)">−</button>
                <span class="cntr-val" id="pullups-count">${habit.todayCount || 0}</span>
                <button class="cntr-btn" onclick="adjustPullups(1)">+</button>
                <span style="font-size:0.8em;color:var(--mid);margin-left:4px">reps</span>
            </div>`;
        }
        if (key === 'water') {
            const glasses = habit.todayGlasses || 0;
            html += `<div class="habit-counter">
                <span class="cntr-lbl">Glasses (goal: ${habit.dailyGoal||8})</span>
                <button class="cntr-btn" onclick="adjustWater(-1)">−</button>
                <span class="cntr-val" id="water-count">${glasses}</span>
                <button class="cntr-btn" onclick="adjustWater(1)">+</button>
                <span style="font-size:0.8em;color:var(--mid);margin-left:4px">💧</span>
            </div>`;
        }

        html += `</div>`;
    });

    document.getElementById('panel-habits').innerHTML = html;
}

function toggleHabitDay(key, dateStr) {
    const habit = state.habits[key];
    const cfg   = HABIT_CONFIG[key];
    const idx   = habit.weekDays.indexOf(dateStr);
    if (idx === -1) {
        habit.weekDays.push(dateStr);
        if (dateStr === todayStr()) { habit.todayDone = true; }
        habit.streak = calcStreak(habit.weekDays);
        addPoints(cfg.pts); playTick();
    } else {
        habit.weekDays.splice(idx, 1);
        if (dateStr === todayStr()) { habit.todayDone = false; }
        habit.streak = calcStreak(habit.weekDays);
        subtractPoints(cfg.pts);
    }
    saveState();
    renderHabitsPanel();
    renderDashboard();
}

function calcStreak(weekDays) {
    // Simple streak: how many consecutive days ending today
    let streak = 0;
    let d = todayStr();
    while (weekDays.includes(d)) {
        streak++;
        d = addDays(d, -1);
    }
    return streak;
}

function adjustPullups(delta) {
    const h = state.habits.pullups;
    h.todayCount = Math.max(0, (h.todayCount || 0) + delta);
    if (h.todayCount >= 10 && !h.weekDays.includes(todayStr())) {
        toggleHabitDay('pullups', todayStr());
        return;
    }
    saveState();
    ['pullups-count','db-pullups-count'].forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.textContent = h.todayCount; el.classList.add('pop'); setTimeout(()=>el.classList.remove('pop'),300); }
    });
}

function adjustWater(delta) {
    const h = state.habits.water;
    h.todayGlasses = Math.max(0, (h.todayGlasses || 0) + delta);
    const goal = h.dailyGoal || 8;
    if (h.todayGlasses >= goal && !h.weekDays.includes(todayStr())) {
        toggleHabitDay('water', todayStr());
        return;
    }
    saveState();
    ['water-count','db-water-count'].forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.textContent = h.todayGlasses; el.classList.add('pop'); setTimeout(()=>el.classList.remove('pop'),300); }
    });
}

// ═══════════════════════════════════════════════════
//  MOOD PANEL
// ═══════════════════════════════════════════════════
function renderMoodPanel() {
    const current = state.mood.today;
    const history = state.mood.history.slice(-7).reverse();
    const dayLabels = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    let html = `
        <div class="mood-q">How are you feeling today? ${current ? MOODS.find(m=>m.key===current)?.emoji || '' : ''}</div>
        <div class="mood-grid">
            ${MOODS.map(m =>
                `<div class="mood-opt ${current === m.key ? 'selected' : ''}" onclick="setMood('${m.key}')">
                    <div class="mood-em">${m.emoji}</div>
                    <div class="mood-lbl">${m.label}</div>
                </div>`
            ).join('')}
        </div>
    `;

    if (history.length > 0) {
        html += `<div class="mood-history">
            <div class="mood-h-title">Last 7 Days</div>
            <div class="mood-h-row">
                ${history.map(h => {
                    const d = new Date(h.date + 'T12:00:00');
                    return `<div class="mood-h-item">
                        <div class="mood-h-em">${h.emoji}</div>
                        <div class="mood-h-day">${dayLabels[d.getDay()]}</div>
                    </div>`;
                }).join('')}
            </div>
        </div>`;
    }

    document.getElementById('panel-mood').innerHTML = html;
}

function setMood(key) {
    const mood = MOODS.find(m => m.key === key);
    if (!mood) return;

    // Add 5 pts for logging mood (only once per day)
    if (!state.mood.today) addPoints(5);
    state.mood.today = key;

    // Update history (replace today's entry if it exists)
    const today = todayStr();
    const idx = state.mood.history.findIndex(h => h.date === today);
    const entry = { date: today, mood: key, emoji: mood.emoji };
    if (idx === -1) state.mood.history.push(entry);
    else state.mood.history[idx] = entry;

    saveState();
    playTick();
    renderMoodPanel();
    renderDashboard();
}

// ═══════════════════════════════════════════════════
//  POINTS PANEL
// ═══════════════════════════════════════════════════
function renderPointsPanel() {
    const pts   = state.points;
    const tier  = getTier(pts.month);
    const next  = getNextTier(pts.month);
    const nextMin = next ? next.min : tier.min;
    const pct   = next ? Math.min(100, ((pts.month - tier.min) / (nextMin - tier.min)) * 100) : 100;

    let html = `
        <div class="pts-tier-card" data-icon="${tier.icon}">
            <div class="tier-icon-big">${tier.icon}</div>
            <div class="tier-name-big">${tier.name}</div>
            <div class="tier-pts-sub">${pts.month} pts this month</div>
        </div>

        <div class="pts-stats-row">
            <div class="pts-stat">
                <div class="pts-stat-val">${pts.today}</div>
                <div class="pts-stat-lbl">Today</div>
            </div>
            <div class="pts-stat">
                <div class="pts-stat-val">${pts.week}</div>
                <div class="pts-stat-lbl">This Week</div>
            </div>
            <div class="pts-stat">
                <div class="pts-stat-val">${pts.total}</div>
                <div class="pts-stat-lbl">All Time</div>
            </div>
        </div>
    `;

    if (next) {
        html += `<div class="next-tier-card">
            <div class="nt-label">
                <span>${tier.icon} ${tier.name}</span>
                <span>${next.icon} ${next.name} at ${next.min} pts</span>
            </div>
            <div class="pbar"><div class="pbar-fill" style="width:${pct.toFixed(0)}%"></div></div>
            <div style="text-align:center;font-size:0.8em;color:var(--mid);margin-top:8px">
                ${next.min - pts.month} pts to go!
            </div>
        </div>`;
    } else {
        html += `<div class="next-tier-card" style="text-align:center;padding:20px">
            <div style="font-size:2em;margin-bottom:8px">🦁</div>
            <div style="font-weight:800;font-size:1.1em">You're a Legend!</div>
            <div style="color:var(--mid);font-size:0.88em;margin-top:4px">Maximum tier reached — amazing work!</div>
        </div>`;
    }

    html += `
        <div class="pts-how-to">
            <div style="font-size:0.9em;font-weight:800;color:var(--dark);margin-bottom:10px">How to Earn Points</div>
            ${[
                ['Chore (each)',    '+3–10 pts'],
                ['Homework done',   '+10 pts'],
                ['Pomodoro session','+15 pts'],
                ['Kung Fu practice','+6–18 pts'],
                ['Flash cards',     '+5 pts'],
                ['Gujarati (per 2min)', '+2 pts'],
                ['Habit day',       '+6–10 pts'],
                ['Log mood',        '+5 pts'],
            ].map(([what, pts]) =>
                `<div class="how-row"><span>${what}</span><span class="how-pts">${pts}</span></div>`
            ).join('')}
        </div>
    `;

    document.getElementById('panel-points').innerHTML = html;
}

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
function init() {
    loadState();
    renderDashboard();

    // If Pomodoro was active from a previous session, restore interval
    if (state.pomodoro && state.pomodoro.active) {
        startPomoInterval();
    }

    // If Gujarati timer was running, mark as stopped (page reload)
    if (state.gujarati.timerRunning) {
        stopGujaratiTimer();
    }
}

// Home Assistant integration helper (called from HA webhook)
window.haUpdateChores = function(choreData) {
    if (!choreData || !choreData.morning) return;
    state.chores = choreData;
    saveState();
    renderDashboard();
};

window.haUpdateCalendar = function(events) {
    if (!Array.isArray(events)) return;
    state.calendar.events = events;
    saveState();
    renderDashboard();
};

init();
</script>
