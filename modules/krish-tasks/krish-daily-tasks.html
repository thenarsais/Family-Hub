function checkDifficultyUnlocks() {
    const accuracy = getOverallAccuracy();
    let unlockedModes = [];

    // Pro unlock: 80% accuracy overall
    if (!state.trivia.difficulty.proUnlocked && accuracy >= 0.80) {
        state.trivia.difficulty.proUnlocked = true;
        state.trivia.difficulty.proUnlockedDate = todayStr();
        unlockedModes.push('pro');
    }

    // Legend unlock: 80% accuracy in medium difficulty
    const mediumStats = triviaProgress?.difficultyPerformance?.medium;
    if (!state.trivia.difficulty.legendUnlocked && mediumStats) {
        const mediumAccuracy = mediumStats.total > 0 ? (mediumStats.correct / mediumStats.total) : 0;
        if (mediumAccuracy >= 0.80) {
            state.trivia.difficulty.legendUnlocked = true;
            state.trivia.difficulty.legendUnlockedDate = todayStr();
            unlockedModes.push('legend');
        }
    }

    return unlockedModes;
}

function getQuestionsForMode(mode) {
    // Filter questions based on difficulty mode
    const allQuestions = TRIVIA_QUESTION_BANK || [];
    const modeMap = {
        rookie: ['easy'],
        pro: ['easy', 'medium'],
        legend: ['easy', 'medium', 'hard']
    };
    const difficulties = modeMap[mode] || ['easy'];
    return allQuestions.filter(q => difficulties.includes(q.difficulty || 'medium'));
}

function setDifficultyMode(mode) {
    if (mode === 'pro' && !state.trivia.difficulty.proUnlocked) return;
    if (mode === 'legend' && !state.trivia.difficulty.legendUnlocked) return;
    state.trivia.difficulty.currentMode = mode;
    saveState();
    refillTriviaBuffer();
    renderTriviaPanel();
}

function checkBadges() {
    if (!state.trivia.badges.byCategory) state.trivia.badges.byCategory = {};

    // Check category badges
    const cats = triviaProgress?.categoryPerformance || {};
    let newBadges = [];

    Object.entries(cats).forEach(([category, stats]) => {
        if (!state.trivia.badges.byCategory[category]) {
            state.trivia.badges.byCategory[category] = {};
        }

        const accuracy = stats.total > 0 ? (stats.correct / stats.total) : 0;
        const badges = state.trivia.badges.byCategory[category];

        Object.entries(BADGE_TIERS).forEach(([tier, threshold]) => {
            // Check if threshold is met and badge not yet unlocked
            if (!badges[tier] && stats.correct >= threshold.correct && accuracy >= threshold.accuracy) {
                badges[tier] = todayStr();
                newBadges.push({ category, tier, threshold });
            }
        });
    });

    return newBadges;
}

function getBadgeInfo(category, tier) {
    const badge = BADGE_TIERS[tier];
    return {
        tier,
        emoji: badge.emoji,
        color: badge.color,
        label: tier.charAt(0).toUpperCase() + tier.slice(1),
        requirement: `${badge.correct} correct · ${(badge.accuracy * 100).toFixed(0)}% accuracy`,
        category
    };
}

// ── PHASE 4: Goals System ────────────────────────
function createGoal(type, target, setBy = 'krish', category = null) {
    if (!state.trivia.goals) state.trivia.goals = [];
    const id = 'goal_' + Date.now();
    const goal = {
        id,
        type, // 'daily' | 'weekly' | 'category' | 'points'
        target,
        current: 0,
        category, // for category mastery goals
        setBy, // 'krish' | 'parent'
        createdDate: todayStr(),
        completed: false,
        completedDate: null
    };
    state.trivia.goals.push(goal);
    saveState();
    return goal;
}

function updateGoalProgress() {
    if (!state.trivia.goals) return [];
    const today = todayStr();
    const weekStart = getMondayOfWeek(today);
    let completedGoals = [];

    state.trivia.goals.forEach(goal => {
        if (goal.completed) return;

        let current = 0;
        switch (goal.type) {
            case 'daily':
                current = state.points.today;
                break;
            case 'weekly':
                current = state.points.week;
                break;
            case 'category':
                const catStats = triviaProgress?.categoryPerformance?.[goal.category];
                current = catStats ? ((catStats.correct / catStats.total) * 100).toFixed(0) : 0;
                break;
            case 'points':
                current = state.points.today; // daily points goal
                break;
        }

        goal.current = current;

        if (current >= goal.target) {
            goal.completed = true;
            goal.completedDate = today;
            completedGoals.push(goal);
        }
    });

    // Reset daily goals at end of day
    state.trivia.goals.forEach(goal => {
        if (goal.type === 'daily' && goal.createdDate !== today && goal.completed && !goal.completedDate.includes(today)) {
            const newGoal = createGoal(goal.type, goal.target, goal.setBy);
            // Remove old goal
            state.trivia.goals = state.trivia.goals.filter(g => g.id !== goal.id);
        }
    });

    return completedGoals;
}

function deleteGoal(goalId) {
    if (!state.trivia.goals) return;
    state.trivia.goals = state.trivia.goals.filter(g => g.id !== goalId);
    saveState();
}

function getActiveGoals() {
    if (!state.trivia.goals) return [];
    return state.trivia.goals.filter(g => !g.completed);
}

function getGoalProgress(goal) {
    const pct = Math.min(100, (goal.current / goal.target) * 100);
    return pct;
}

// ── PHASE 4: Points System ────────────────────────
function calculatePoints(question, isCorrect) {
    if (!isCorrect) return 0;

    // Base points by difficulty
    const basePoints = { easy: 1, medium: 3, hard: 5 };
    const difficulty = question.difficulty || 'medium';
    let points = basePoints[difficulty] || 3;

    // Accuracy penalty: reduce points by (100 - current_accuracy)%
    const accuracy = getOverallAccuracy();
    const accuracyFactor = Math.max(0.5, accuracy / 100); // min 0.5x multiplier
    points = Math.round(points * accuracyFactor);

    // Minimum 1 point for correct answer
    return Math.max(1, points);
}

function awardPoints(points) {
    const today = todayStr();
    state.points = state.points || { today: 0, week: 0, month: 0, total: 0 };
    state.points.today += points;
    state.points.week += points;
    state.points.month += points;
    state.points.total += points;
}

// ── TTS (Text-to-Speech) ──────────────────────────
function speakQuestion() {
    if (!state.trivia.onboarding.showTTS || !triviaCurrentQuestion) return;
    const synth = window.speechSynthesis;
    synth.cancel();
    const text = `${triviaCurrentQuestion.question}\n\nOptions are: ${triviaCurrentQuestion.options.join(', ')}`;
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = 1;
    utterance.pitch = 1;
    synth.speak(utterance);
}

async function saveTriviaAnswer(questionId, isCorrect) {
    const today = todayStr();
    try {
        const db = await openTriviaDB();
        const htx = db.transaction('answerHistory', 'readwrite');
        await idbAdd(htx.objectStore('answerHistory'), { userId: TRIVIA_USER_ID, questionId, correct: isCorrect, timestamp: new Date().toISOString(), date: today });

        // Update exclusion list
        triviaProgress.exclusionList = triviaProgress.exclusionList || [];
        triviaProgress.exclusionList.push({ questionId, answeredDate: today });

        // Update incorrect pool
        triviaProgress.incorrectPool = triviaProgress.incorrectPool || [];
        if (!isCorrect) {
            const ex = triviaProgress.incorrectPool.find(p => p.questionId === questionId);
            if (ex) { ex.lastWrong = today; ex.count = (ex.count || 1) + 1; }
            else triviaProgress.incorrectPool.push({ questionId, lastWrong: today, count: 1 });
        }

        // Update streak
        triviaProgress.streaks = triviaProgress.streaks || { daily: 0, lastDate: null };
        const lastDate = triviaProgress.streaks.lastDate;
        const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
        const yStr = yesterday.toISOString().split('T')[0];
        if (!lastDate || lastDate === yStr) {
            triviaProgress.streaks.daily = (triviaProgress.streaks.daily || 0) + 1;
        } else if (lastDate !== today) {
            triviaProgress.streaks.daily = 1;
        }
        triviaProgress.streaks.lastDate = today;
        triviaProgress.totalAnswered = (triviaProgress.totalAnswered || 0) + 1;

        // ── PHASE 4: Award Points ───────────────────────
        if (isCorrect) {
            const q = triviaCurrentQuestion;
            const points = calculatePoints(q, isCorrect);
            awardPoints(points);
            // Store points info for display in result
            triviaLastPointsEarned = points;

            // ── PHASE 5: Award Daily Bonus (first game of day) ──
            awardDailyBonus();
        } else {
            triviaLastPointsEarned = 0;
        }

        // ── PHASE 3: Milestone Tracking ────────────────
        if (triviaProgress.streaks.daily > 0 && !state.trivia.onboarding.milestones.firstStreak) {
            state.trivia.onboarding.milestones.firstStreak = true;
            saveState();
        }

        // ── PHASE 2: Extended Metrics ──────────────────
        const q = triviaCurrentQuestion;
        if (q) {
            // Category performance + streak
            triviaProgress.categoryPerformance = triviaProgress.categoryPerformance || {};
            if (!triviaProgress.categoryPerformance[q.category]) {
                triviaProgress.categoryPerformance[q.category] = { total: 0, correct: 0, streak: 0, lastDate: null };
            }
            triviaProgress.categoryPerformance[q.category].total++;
            if (isCorrect) triviaProgress.categoryPerformance[q.category].correct++;
            triviaProgress.categoryPerformance[q.category].lastDate = today;

            // Update category streak
            if (isCorrect) {
                const catLastDate = triviaProgress.categoryPerformance[q.category].lastDate;
                if (catLastDate === today || catLastDate === yStr) {
                    triviaProgress.categoryPerformance[q.category].streak = (triviaProgress.categoryPerformance[q.category].streak || 0) + 1;
                } else {
                    triviaProgress.categoryPerformance[q.category].streak = 1;
                }
            } else {
                triviaProgress.categoryPerformance[q.category].streak = 0;
            }

            // Difficulty performance
            triviaProgress.difficultyPerformance = triviaProgress.difficultyPerformance || {};
            const diff = q.difficulty || 'medium';
            if (!triviaProgress.difficultyPerformance[diff]) {
                triviaProgress.difficultyPerformance[diff] = { total: 0, correct: 0 };
            }
            triviaProgress.difficultyPerformance[diff].total++;
            if (isCorrect) triviaProgress.difficultyPerformance[diff].correct++;
        }

        // Update accuracy streak (consecutive correct answers)
        triviaProgress.streaks.accuracy = triviaProgress.streaks.accuracy || { count: 0, lastDate: null };
        if (isCorrect) {
            const accLastDate = triviaProgress.streaks.accuracy.lastDate;
            if (accLastDate === today || accLastDate === yStr) {
                triviaProgress.streaks.accuracy.count = (triviaProgress.streaks.accuracy.count || 0) + 1;
            } else {
                triviaProgress.streaks.accuracy.count = 1;
            }
            triviaProgress.streaks.accuracy.lastDate = today;
        } else {
            triviaProgress.streaks.accuracy.count = 0;
        }

        // Update category streak in streaks object
        if (q && isCorrect) {
            triviaProgress.streaks.category = triviaProgress.streaks.category || { category: null, count: 0 };
            triviaProgress.streaks.category.category = q.category;
            triviaProgress.streaks.category.count = triviaProgress.categoryPerformance[q.category].streak;
            triviaProgress.streaks.category.lastDate = today;
        }

        // Full answer history (for trends + export)
        triviaProgress.answerHistory = triviaProgress.answerHistory || [];
        triviaProgress.answerHistory.push({
            qId: questionId,
            cat: q?.category || 'Unknown',
            diff: q?.difficulty || 'medium',
            correct: isCorrect,
            time: new Date().toISOString()
        });

        // Calculate overall stats
        const totalAnswered = triviaProgress.answerHistory.length;
        const totalCorrect = triviaProgress.answerHistory.filter(a => a.correct).length;
        triviaProgress.stats = {
            total: totalAnswered,
            correct: totalCorrect,
            accuracy: totalAnswered > 0 ? (totalCorrect / totalAnswered).toFixed(4) : 0
        };

        const ptx = db.transaction('userProgress', 'readwrite');
        await idbPut(ptx.objectStore('userProgress'), triviaProgress);
    } catch (err) {
        console.error('[Trivia] Failed to save answer:', err);
    }

    // ── Check for badge unlocks ────────────────────
    const newBadges = checkBadges();
    if (newBadges.length > 0) {
        newBadges.forEach(b => showBadgeCelebration(b.category, b.tier));
    }

    // ── PHASE 5: Check for game unlocks ────────────
    const newGameUnlocks = checkGameUnlocks();
    if (newGameUnlocks.length > 0) {
        newGameUnlocks.forEach(gameId => {
            showUnlockToast(gameId);
        });
        // Refresh Trivia panel to show new game cards
        if (currentTab === 'trivia') {
            renderTriviaPanel();
        }
    }

    // ── Check for difficulty unlocks ────────────────
    const newModes = checkDifficultyUnlocks();
    if (newModes.length > 0) {
        newModes.forEach(mode => showDifficultyUnlock(mode));
    }

    // ── Check for goal completions ──────────────────
    const completedGoals = updateGoalProgress();
    if (completedGoals.length > 0) {
        completedGoals.forEach(goal => showGoalCompletion(goal));
    }

    saveState();
    renderDashboard();
    renderDashTrivia();
}

async function exportTriviaDataJSON() {
    if (!triviaProgress) return alert('No data to export');
    const data = {
        exportDate: new Date().toISOString(),
        userId: triviaProgress.userId,
        stats: triviaProgress.stats,
        streaks: triviaProgress.streaks,
        categoryPerformance: triviaProgress.categoryPerformance,
        difficultyPerformance: triviaProgress.difficultyPerformance,
        answerHistory: triviaProgress.answerHistory || []
    };
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `trivia-export-${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);
}

async function exportTriviaDataCSV() {
    if (!triviaProgress || !triviaProgress.answerHistory) return alert('No data to export');
    const rows = [
        ['Date', 'Category', 'Difficulty', 'Correct', 'Overall Accuracy'],
        ...triviaProgress.answerHistory.map(a => [
            new Date(a.time).toLocaleDateString(),
            a.cat,
            a.diff,
            a.correct ? 'Yes' : 'No',
            triviaProgress.stats.accuracy
        ])
    ];
    const csv = rows.map(r => r.map(v => `"${v}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `trivia-export-${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
    URL.revokeObjectURL(url);
}

function checkTriviaAnswer(btn) {
    const q = triviaCurrentQuestion;
    if (!q || btn.dataset.locked) return;
    const selected = btn.dataset.answer;
    const isCorrect = selected === q.correct;

    if (isCorrect) {
        // Correct — lock all, highlight green, show result
        document.querySelectorAll('.trivia-opt').forEach(b => {
            b.dataset.locked = '1';
            b.onclick = null; b.onmouseover = null; b.onmouseout = null;

            else if (!b.dataset.wrong) { b.style.opacity = '0.45'; }
        });
        triviaAttemptCount = 0;
        saveTriviaAnswer(q.uuid, true);
        showTriviaResult(true, q);

        document.querySelectorAll('.trivia-opt').forEach(b => {

const GAME_UNLOCK_THRESHOLDS = {
    wordle: { correctCount: 5, accuracy: 0 }, // Unlock at 5 correct answers (access gate)
    quickfire: { correctCount: 10, accuracy: 0.70 }, // 10 correct + 70% accuracy (bronze)
    memory: { correctCount: 50, accuracy: 0 }, // 50 correct (silver-ish)
    scramble: { correctCount: 100, accuracy: 0 }, // 100 correct (gold)
};

window.checkGameUnlocks = function() {
    if (!state.trivia) return [];
    if (!state.games) state.games = { unlocked: [], stats: {} };

    // Get current trivia stats - calculate from categoryPerformance
    const cats = triviaProgress?.categoryPerformance || {};
    const correctCount = Object.values(cats).reduce((sum, cat) => sum + (cat.correct || 0), 0);
    const totalAnswered = triviaProgress?.totalAnswered || 1;
    const accuracy = totalAnswered > 0 ? correctCount / totalAnswered : 0;

    const newUnlocks = [];

    for (const [gameId, threshold] of Object.entries(GAME_UNLOCK_THRESHOLDS)) {
        // Check if already unlocked
        if (state.games.unlocked.includes(gameId)) continue;

        // Check unlock criteria
        const meetsCorrectCount = correctCount >= threshold.correctCount;
        const meetsAccuracy = threshold.accuracy === 0 || accuracy >= threshold.accuracy;

        if (meetsCorrectCount && meetsAccuracy) {
            state.games.unlocked.push(gameId);
            newUnlocks.push(gameId);
        }
    }

    // Save state if unlocks happened
    if (newUnlocks.length > 0) {
        saveState();
    }

    return newUnlocks;
};

window.getGameUnlockProgress = function(gameId) {
    if (!state.trivia) return { current: 0, threshold: 1, pct: 0 };
    if (!GAME_UNLOCK_THRESHOLDS[gameId]) return { current: 0, threshold: 1, pct: 0 };

    // Calculate total correct from categoryPerformance
    const cats = triviaProgress?.categoryPerformance || {};
    const correctCount = Object.values(cats).reduce((sum, cat) => sum + (cat.correct || 0), 0);
    const threshold = GAME_UNLOCK_THRESHOLDS[gameId].correctCount;
    const current = Math.min(correctCount, threshold);
    const pct = threshold > 0 ? (current / threshold) : 0;

    return { current, threshold, pct };
};

window.recordGamePlay = function(gameId, score, won) {
    if (!state.games.stats[gameId]) {
        state.games.stats[gameId] = { plays: 0, wins: 0, bestScore: 0, lastPlayed: null };
    }

    const stats = state.games.stats[gameId];
    stats.plays += 1;
    if (won) stats.wins += 1;
    if (score > (stats.bestScore || 0)) stats.bestScore = score;
    stats.lastPlayed = todayStr();

    saveState();
};

// Extract all 5-letter category names from TRIVIA_QUESTION_BANK
function get5LetterCategories() {
    const categories = new Set();
    TRIVIA_QUESTION_BANK.forEach(q => {
        const cat = q.category || '';
        if (cat.length === 5) {
            categories.add(cat.toUpperCase());
        }
    });
    // Fallback categories if not enough in question bank
    const fallback = ['BRAIN', 'EARTH', 'SPACE', 'OCEAN', 'PLANT', 'MUSIC', 'SPORT', 'MATH'];
    fallback.forEach(cat => categories.add(cat));
    return Array.from(categories);
}

// Initialize a new Wordle game
window.initializeWordleGame = function() {
    const categories = get5LetterCategories();
    const answer = categories[Math.floor(Math.random() * categories.length)].toUpperCase();

    return {
        gameId: 'wordle',
        answer: answer,
        guesses: [],
        gameState: 'playing', // playing | won | lost
        attempts: 0,
        maxAttempts: 6,
        feedback: [] // Array of {guess, feedback: [letter, color]}
    };
};

// Validate a guess against the answer
// Returns feedback: ['🟩', '🟨', '⬜'] for each letter
function getWordleFeedback(guess, answer) {
    guess = guess.toUpperCase();
    answer = answer.toUpperCase();

    if (guess.length !== answer.length) return null;

    const feedback = [];
    const answerLetters = answer.split('');
    const guessLetters = guess.split('');

    // First pass: mark correct positions (green)
    for (let i = 0; i < guessLetters.length; i++) {
        if (guessLetters[i] === answerLetters[i]) {
            feedback[i] = '🟩';
            answerLetters[i] = null; // Mark as used
        }
    }

    // Second pass: mark wrong positions (yellow) and non-existent (gray)
    for (let i = 0; i < guessLetters.length; i++) {
        if (feedback[i]) continue; // Already marked green

        const letterIndex = answerLetters.indexOf(guessLetters[i]);
        if (letterIndex !== -1) {
            feedback[i] = '🟨';
            answerLetters[letterIndex] = null; // Mark as used
        } else {
            feedback[i] = '⬜';
        }
    }

    return feedback;
}

// Process a guess in the game
window.wordleSubmitGuess = function(game, guess) {
    if (game.gameState !== 'playing') return game; // Game already over

    guess = guess.toUpperCase().trim();
    if (guess.length !== game.answer.length) return game;

    game.attempts += 1;
    const feedback = getWordleFeedback(guess, game.answer);
    game.guesses.push(guess);
    game.feedback.push({ guess, feedback });

    // Check win condition
    if (guess === game.answer) {
        game.gameState = 'won';
        const score = game.attempts <= 3 ? 100 : game.attempts <= 6 ? 50 : 0;
        game.score = score;
    }
    // Check lose condition
    else if (game.attempts >= game.maxAttempts) {
        game.gameState = 'lost';
        game.score = 0;
    }

    return game;
};

// Calculate Wordle score
window.wordleCalculateScore = function(attempts) {
    if (attempts <= 3) return 100;
    if (attempts <= 6) return 50;
    return 0;
};

    if (!input || !window._wordleGame) return;

    const guess = input.value.trim().toUpperCase();
    if (guess.length !== 5) {
        alert('Enter a 5-letter word');
        return;
    }

    wordleSubmitGuess(window._wordleGame, guess);
    input.value = '';

    const panel = document.getElementById('wordle-panel-content');
    if (panel) {
        panel.innerHTML = renderWordleGame(window._wordleGame);

        if (window._wordleGame.gameState !== 'playing') {
            setTimeout(() => {
                recordGamePlay('wordle', window._wordleGame.score, window._wordleGame.gameState === 'won');
                if (window._wordleGame.score > 0) awardPoints(window._wordleGame.score);
            }, 100);
        } else {
            setTimeout(() => document.getElementById('wordle-input').focus(), 50);
        }
    }
};

// ── QUICK-FIRE GAME ENGINE ────────────────────────────
window.initializeQuickFireGame = function() {
    // Select 10 random questions (avoid recently answered)
    const pool = TRIVIA_QUESTION_BANK.filter(q => {
        // Filter by difficulty mode
        if (state.trivia.difficulty.currentMode === 'rookie') {
            return q.difficulty === 'easy';
        } else if (state.trivia.difficulty.currentMode === 'pro') {
            return q.difficulty === 'medium';
        } else {
            return q.difficulty === 'hard';
        }
    });

    // Exclude recently answered questions
    const exclusions = (triviaProgress?.exclusionList || []).map(e => e.questionId);
    const available = pool.filter(q => !exclusions.includes(q.uuid));

    // If not enough available, use pool as fallback
    const questions = (available.length >= 10 ? available : pool)
        .sort(() => Math.random() - 0.5)
        .slice(0, 10);

    return {
        gameId: 'quickfire',
        gameState: 'playing', // playing | won | lost
        questions: questions,
        currentQuestionIndex: 0,
        score: 0,
        answers: [], // Array of { questionId, selected, correct, timeTaken, combo, pointsAwarded }
        combo: 1, // Starts at 1×
        timerStartTime: Date.now(),
        questionStartTime: Date.now(),
        selectedBoost: null,
        boostUsed: false,
        stats: {
            correctCount: 0,
            wrongCount: 0,
            totalTime: 0
        }
    };
};

window.selectBoost = function(boostId) {
    // Clear previous selection
    document.querySelectorAll('.boost-option').forEach(btn => {
        btn.style.borderColor = 'var(--mid)';
        btn.style.background = 'var(--modal-bg)';
    });

    // Highlight selected
    const selected = document.querySelector(`[data-boost="${boostId}"]`);
    if (selected) {
        selected.style.borderColor = '#0EA5E9';
        selected.style.background = 'var(--modal-bg)';
    }

    // Enable "Play with boost" button
    const playBtn = document.getElementById('play-with-boost');
    playBtn.style.background = '#0EA5E9';
    playBtn.style.color = 'white';
    playBtn.style.cursor = 'pointer';
    playBtn.style.opacity = '1';
    playBtn.disabled = false;
    playBtn.innerHTML = `Play with ${boostId}`;
    playBtn.onclick = () => startQuickFireWithBoost(boostId);

    // Store selection
    window._selectedBoost = boostId;
};

window.startQuickFireWithBoost = function(boostId) {
    boostId = boostId || window._selectedBoost;
    if (!boostId) return;

    // Deduct boost from inventory
    state.boosts[boostId]--;
    saveState();

    // Close modal and start game
    const modal = document.getElementById('boost-modal');
    if (modal) modal.remove();

    // Initialize game with boost
    window._quickFireGame = initializeQuickFireGame();
    window._quickFireGame.selectedBoost = boostId;
    renderQuickFireGame(window._quickFireGame);
};

window.startQuickFireWithoutBoost = function() {
    // Close modal and start game without boost
    const modal = document.getElementById('boost-modal');
    if (modal) modal.remove();

    window._quickFireGame = initializeQuickFireGame();
    renderQuickFireGame(window._quickFireGame);
};

window.renderQuickFireGame = function(game) {
    if (!game) return;

    const q = game.questions[game.currentQuestionIndex];
    if (!q) {
        endQuickFireGame(game);
        return;
    }

    const progress = game.currentQuestionIndex + 1;
    const options = shuffleArr(q.options);

    const modal = document.getElementById('quickfire-modal') || document.createElement('div');
    modal.id = 'quickfire-modal';
    modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:flex;justify-content:center;align-items:center;z-index:9999;padding:20px';

    // Determine which answer to hide if Hint boost is active
    let hiddenAnswerIndex = -1;
    if (game.selectedBoost === 'hint' && !game.boostUsed) {
        // Find a wrong answer to hide
        const wrongIndices = options
            .map((opt, i) => opt !== q.correct ? i : -1)
            .filter(i => i !== -1);
        if (wrongIndices.length > 0) {
            hiddenAnswerIndex = wrongIndices[Math.floor(Math.random() * wrongIndices.length)];
        }
    }

    const boostIndicator = game.selectedBoost ? `<div style="font-size:0.8em;color:var(--boost-accent);font-weight:800;padding:4px 8px;background:var(--boost-bg);border-radius:6px">${
        game.selectedBoost === 'double_points' ? '2️⃣ 2× Active' :
        game.selectedBoost === 'skip' && !game.boostUsed ? '⏭️ Skip Ready' :
        game.selectedBoost === 'hint' && !game.boostUsed ? '💡 Hint Ready' : ''
    }</div>` : '';

    const card = document.createElement('div');
    card.style.cssText = 'background:var(--dark);border-radius:20px;padding:24px;max-width:600px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,0.3);color:white;max-height:90vh;overflow-y:auto';
    card.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                <h2 style="font-size:1.5em;font-weight:800;margin:0">⚡ Quick-Fire</h2>
                <div style="font-size:0.9em;color:var(--text-muted)">${progress}/10</div>
                ${boostIndicator}
            </div>
            <div style="text-align:right">
                <div id="qf-timer" style="font-size:1.8em;font-weight:800;color:var(--theme-primary)">15s</div>
                <div id="qf-combo" style="font-size:0.9em;color:#FCD34D;font-weight:800;display:${game.combo > 1 ? 'block' : 'none'}">🔥 ${game.combo}× Combo</div>
            </div>
        </div>

        <div style="background:var(--modal-bg);padding:16px;border-radius:12px;margin-bottom:16px">
            <div style="font-size:0.9em;color:var(--text-muted);margin-bottom:8px">Question ${progress}/10</div>
            <div style="font-size:1.1em;font-weight:600;color:white;margin-bottom:16px;line-height:1.5">${q.question}</div>
            ${hiddenAnswerIndex >= 0 ? '<div style="font-size:0.8em;color:#FCD34D;margin-bottom:8px">💡 1 incorrect answer hidden</div>' : ''}
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
                ${options.map((opt, i) => `
                    ${i === hiddenAnswerIndex ? '<div style="padding:12px;background:var(--mid);border:2px solid var(--mid);border-radius:10px;color:var(--text-muted);font-weight:600;font-size:0.9em;text-align:center">❌ Hidden</div>' : `
                        <button class="qf-answer"
                            data-answer="${opt.replace(/"/g,'&quot;')}"
                            onclick="quickFireAnswerClick(this)"
                            style="padding:12px;background:white;border:2px solid var(--border-light);border-radius:10px;color:var(--dark);cursor:pointer;font-weight:600;font-size:0.9em;transition:all 0.2s;text-align:left">
                            <span style="display:inline-block;background:var(--indigo-light);color:#4338CA;border-radius:6px;padding:2px 8px;margin-right:8px;font-weight:800;font-size:0.85em">${String.fromCharCode(65+i)}</span>${opt}
                        </button>
                    `}
                `).join('')}
            </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px">
            <div style="background:var(--stats-success-bg);padding:12px;border-radius:10px;text-align:center">
                <div style="font-size:0.9em;color:#D1FAE5">Score</div>
                <div style="font-size:1.8em;font-weight:800;color:var(--theme-primary)">${game.score}</div>
            </div>
            <div style="background:var(--stats-progress-bg);padding:12px;border-radius:10px;text-align:center">
                <div style="font-size:0.9em;color:#DBEAFE">Progress</div>
                <div style="font-size:1.4em;font-weight:800;color:var(--stats-progress-value)">${game.stats.correctCount}/${progress}</div>
            </div>
        </div>

        <button onclick="quitQuickFireGame()" style="width:100%;margin-top:16px;padding:12px;background:var(--mid);border:none;color:white;border-radius:10px;cursor:pointer;font-weight:600;font-size:0.9em">Quit Game</button>
    `;

    modal.innerHTML = '';
    modal.appendChild(card);
    if (!document.getElementById('quickfire-modal')) {
        document.body.appendChild(modal);
    }

    // Start timer update loop if not already running
    if (!window._quickFireTimer) {
        game.questionStartTime = Date.now();
        window._quickFireTimer = setInterval(() => {
            const elapsed = Math.floor((Date.now() - game.questionStartTime) / 1000);
            const timeRemaining = Math.max(0, 15 - elapsed);

            // Update only timer display (not entire game)
            const timerEl = document.getElementById('qf-timer');
            const comboEl = document.getElementById('qf-combo');
            if (timerEl) {
                const gameColor = timeRemaining > 10 ? 'var(--theme-primary)' : timeRemaining > 5 ? '#F59E0B' : '#EF4444';
                timerEl.textContent = timeRemaining + 's';
                timerEl.style.color = gameColor;
            }
            if (comboEl) {
                comboEl.style.display = game.combo > 1 ? 'block' : 'none';
                comboEl.textContent = `🔥 ${game.combo}× Combo`;
            }

            if (timeRemaining <= 0) {
                clearInterval(window._quickFireTimer);
                window._quickFireTimer = null;
                quickFireTimeoutQuestion();
            }
        }, 100);
    }
};

window.quickFireAnswerClick = function(btn) {
    if (btn.dataset.locked) return;

    const game = window._quickFireGame;
    const q = game.questions[game.currentQuestionIndex];
    const selected = btn.dataset.answer;
    const isCorrect = selected === q.correct;
    const timeTaken = Math.floor((Date.now() - game.questionStartTime) / 1000);

    // Lock all buttons
    document.querySelectorAll('.qf-answer').forEach(b => {
        b.dataset.locked = '1';
        b.onclick = null;
        b.style.cursor = 'default';
        b.style.opacity = '0.5';
    });
    btn.style.opacity = '1';

    // Check for Skip boost (first answer auto-correct)
    const skipBoost = game.selectedBoost === 'skip' && !game.boostUsed;
    const answerIsCorrect = isCorrect || skipBoost;

    // Mark Hint boost as used on first answer
    if (game.selectedBoost === 'hint' && !game.boostUsed) {
        game.boostUsed = true;
    }

    // Highlight answer
    if (answerIsCorrect) {
        btn.style.background = '#DCFCE7';
        btn.style.borderColor = '#16A34A';
        btn.style.color = '#14532D';
        game.combo++;
        game.stats.correctCount++;
        if (skipBoost) {
            game.boostUsed = true;
        }
    } else {
        btn.style.background = '#FEE2E2';
        btn.style.borderColor = '#DC2626';
        game.combo = 1; // Reset combo on wrong
    }

    // Calculate points with Double Points boost if active
    const basePoints = 10;
    const timeBonus = (15 - timeTaken) / 15;
    const comboMultiplier = game.combo;
    const doublePointsMultiplier = game.selectedBoost === 'double_points' ? 2 : 1;
    const pointsAwarded = Math.max(0, Math.floor(basePoints * comboMultiplier * timeBonus * doublePointsMultiplier));

    game.score += pointsAwarded;
    game.answers.push({
        questionId: q.uuid,
        selected,
        correct: answerIsCorrect,
        timeTaken,
        combo: comboMultiplier,
        pointsAwarded,
        boostApplied: skipBoost ? 'skip' : null
    });

    // Wait 800ms then advance
    setTimeout(() => {
        game.currentQuestionIndex++;
        clearInterval(window._quickFireTimer);
        window._quickFireTimer = null;
        if (game.currentQuestionIndex >= 10) {
            endQuickFireGame(game);
        } else {
            game.questionStartTime = Date.now();
            renderQuickFireGame(game);
        }
    }, 800);
};

window.quickFireTimeoutQuestion = function() {
    const game = window._quickFireGame;
    game.combo = 1; // Reset combo on timeout
    game.currentQuestionIndex++;

    if (game.currentQuestionIndex >= 10) {
        endQuickFireGame(game);
    } else {
        game.questionStartTime = Date.now();
        renderQuickFireGame(game);
    }
};

window.quitQuickFireGame = function() {
    if (window._quickFireTimer) {
        clearInterval(window._quickFireTimer);
        window._quickFireTimer = null;
    }
    const modal = document.getElementById('quickfire-modal');
    if (modal) modal.remove();
    window._quickFireGame = null;
};

window.endQuickFireGame = function(game) {
    clearInterval(window._quickFireTimer);
    window._quickFireTimer = null;

    const accuracy = game.stats.correctCount / 10;
    const won = game.stats.correctCount >= 7; // Arbitrary threshold for "win"

    // Save game stats
    recordGamePlay('quickfire', game.score, won);

    // Show results
    showQuickFireResults(game, accuracy);
};

window.startMemoryGame = function() {

    showMemoryDifficultyModal();
};

window.showMemoryDifficultyModal = function() {
    const difficulties = [
        { id: 'easy', name: 'Easy', icon: '🟢', tiles: 8, pairs: 4, time: '2 min', cols: 4, rows: 2 },
        { id: 'medium', name: 'Medium', icon: '🟡', tiles: 12, pairs: 6, time: '3 min', cols: 4, rows: 3 },
        { id: 'hard', name: 'Hard', icon: '🔴', tiles: 16, pairs: 8, time: '4 min', cols: 4, rows: 4 }
    ];

window.initializeMemoryGame = function(difficulty) {
    const config = {
        easy: { pairs: 4, time: 120, cols: 4, rows: 2 },
        medium: { pairs: 6, time: 180, cols: 4, rows: 3 },
        hard: { pairs: 8, time: 240, cols: 4, rows: 4 }
    };
    const settings = config[difficulty] || config.easy;

    // Select random Q&A pairs from trivia bank
    const questionBank = TRIVIA_QUESTION_BANK;
    const selectedPairs = [];
    for (let i = 0; i < settings.pairs; i++) {
        const q = questionBank[Math.floor(Math.random() * questionBank.length)];
        selectedPairs.push({
            pairId: i,
            question: q.question,
            answer: q.correct,
            category: q.category
        });
    }

    // Create tiles (each pair appears twice: question & answer)
    const tiles = [];
    selectedPairs.forEach(pair => {
        tiles.push({
            id: `${pair.pairId}-q`,
            pairId: pair.pairId,
            text: pair.question,
            type: 'question',
            flipped: false,
            matched: false
        });
        tiles.push({
            id: `${pair.pairId}-a`,
            pairId: pair.pairId,
            text: pair.answer,
            type: 'answer',
            flipped: false,
            matched: false
        });
    });

    // Shuffle tiles
    tiles.sort(() => Math.random() - 0.5);

    return {
        gameId: 'memory',
        difficulty: difficulty,
        gameState: 'playing',
        tiles: tiles,
        settings: settings,
        score: 0,
        combo: 1,
        matchesFound: 0,
        totalMatches: settings.pairs,
        attempts: 0,
        flippedTiles: [],
        timerStartTime: Date.now(),
        stats: {
            pairs_matched: 0,
            total_pairs: settings.pairs,
            time_used: 0
        }
    };
};

window.flipMemoryTile = function(tileId) {
    const game = window._memoryGame;
    const tile = game.tiles.find(t => t.id === tileId);

    if (!tile || tile.matched || game.flippedTiles.length >= 2) return;

    // Flip tile
    tile.flipped = true;
    game.flippedTiles.push(tile);

    // Update button display
    const btn = document.getElementById(`tile-${tileId}`);
    if (btn) {
        btn.textContent = tile.text;
        btn.style.background = 'white';
        btn.style.color = 'var(--dark)';
    }

    // Check for match if 2 tiles flipped
    if (game.flippedTiles.length === 2) {
        game.attempts++;
        checkMemoryMatch(game);
    }
};

window.checkMemoryMatch = function(game) {
    const [tile1, tile2] = game.flippedTiles;
    const isMatch = tile1.pairId === tile2.pairId;

    setTimeout(() => {
        if (isMatch) {
            // Match found!
            tile1.matched = true;
            tile2.matched = true;
            game.matchesFound++;
            game.combo++;
            game.stats.pairs_matched++;

            // Calculate points
            const elapsed = Math.floor((Date.now() - game.timerStartTime) / 1000);
            const timeRemaining = Math.max(0, game.settings.time - elapsed);
            const timeBonus = timeRemaining / game.settings.time;
            const basePoints = 50;
            const comboMultiplier = game.combo > 2 ? 1.5 : 1;
            const pointsAwarded = Math.max(0, Math.floor(basePoints * timeBonus * comboMultiplier));
            game.score += pointsAwarded;

            // Update UI
            const btn1 = document.getElementById(`tile-${tile1.id}`);
            const btn2 = document.getElementById(`tile-${tile2.id}`);
            if (btn1 && btn2) {
                btn1.classList.add('matched');
                btn2.classList.add('matched');
                btn1.style.background = '#DCFCE7';
                btn1.style.color = 'var(--text-muted)';
                btn1.style.borderColor = 'var(--theme-primary)';
                btn1.style.boxShadow = '0 2px 8px rgba(16, 185, 129, 0.2)';
                btn1.disabled = true;
                btn2.style.background = '#DCFCE7';
                btn2.style.color = 'var(--text-muted)';
                btn2.style.borderColor = 'var(--theme-primary)';
                btn2.style.boxShadow = '0 2px 8px rgba(16, 185, 129, 0.2)';
                btn2.disabled = true;
            }

            // Update score display
            const scoreEl = document.getElementById('mem-score');
            if (scoreEl) scoreEl.textContent = game.score;

            // Update progress
            const progressEl = document.querySelectorAll('[style*="1E3A8A"]')[0];
            if (progressEl) {
                const div = progressEl.querySelector('div:last-child');
                if (div) div.textContent = `${game.matchesFound}/${game.totalMatches}`;
            }

            // Update combo display
            const comboEl = document.getElementById('mem-combo');
            if (comboEl) {
                comboEl.style.display = game.combo > 1 ? 'block' : 'none';
                comboEl.textContent = `🔥 ${game.combo}× Combo`;
            }

            // Check if game won
            if (game.matchesFound === game.totalMatches) {
                clearInterval(window._memoryTimer);
                window._memoryTimer = null;
                setTimeout(() => endMemoryGame(game, true), 500);
            }
        } else {
            // No match - flip back
            game.combo = 1;
            tile1.flipped = false;
            tile2.flipped = false;

            // Flash red
            const btn1 = document.getElementById(`tile-${tile1.id}`);
            const btn2 = document.getElementById(`tile-${tile2.id}`);
            if (btn1 && btn2) {
                btn1.style.background = '#FEE2E2';
                btn2.style.background = '#FEE2E2';
                setTimeout(() => {
                    btn1.style.background = 'var(--mid)';
                    btn1.textContent = '?';
                    btn1.style.color = 'var(--text-muted)';
                    btn2.style.background = 'var(--mid)';
                    btn2.textContent = '?';
                    btn2.style.color = 'var(--text-muted)';
                }, 200);
            }

            // Update combo display
            const comboEl = document.getElementById('mem-combo');
            if (comboEl) comboEl.style.display = 'none';
        }

        game.flippedTiles = [];
    }, isMatch ? 500 : 1000);
};

window.endMemoryGame = function(game, won) {

    window._memoryTimer = null;

    // Save stats
    const elapsed = Math.floor((Date.now() - game.timerStartTime) / 1000);
    game.stats.time_used = elapsed;
    recordGamePlay('memory', game.score, won);

    // Update leaderboard
    updateMemoryLeaderboard(game);

};

window.updateMemoryLeaderboard = function(game) {
    if (!state.games.stats) state.games.stats = {};
    if (!state.games.stats.memory) {
        state.games.stats.memory = {
            played: 0,
            bestScore: 0,
            leaderboard: []
        };
    }

    const memoryStats = state.games.stats.memory;

    // Initialize leaderboard for this difficulty if needed
    if (!memoryStats.leaderboard) memoryStats.leaderboard = [];

    // Add new score to leaderboard
    const entry = {
        score: game.score,
        difficulty: game.difficulty,
        date: todayStr(),
        won: game.stats.pairs_matched === game.stats.total_pairs,
        combo: game.combo
    };

    memoryStats.leaderboard.push(entry);

    // Sort by score (descending) and filter top 5 per difficulty
    const byDifficulty = {
        easy: [],
        medium: [],
        hard: []
    };

    memoryStats.leaderboard.forEach(e => {
        if (byDifficulty[e.difficulty]) {
            byDifficulty[e.difficulty].push(e);
        }
    });

    // Keep top 5 per difficulty
    ['easy', 'medium', 'hard'].forEach(diff => {
        byDifficulty[diff]
            .sort((a, b) => b.score - a.score)
            .slice(0, 5);
    });

    // Rebuild leaderboard (keep all, but reference by difficulty)
    memoryStats.leaderboard = [];
    ['easy', 'medium', 'hard'].forEach(diff => {
        byDifficulty[diff].forEach(e => {
            memoryStats.leaderboard.push(e);
        });
    });

    // Update personal best
    const personalBest = memoryStats.leaderboard
        .filter(e => e.difficulty === game.difficulty)
        .reduce((max, e) => Math.max(max, e.score), 0);

    memoryStats.bestScore = personalBest;
    memoryStats.played = (memoryStats.played || 0) + 1;

    saveState();
};

window.showMemoryResults = function(game, won) {
    const modal = document.getElementById('memory-modal');
    const timeUsed = `${Math.floor(game.stats.time_used / 60)}m ${game.stats.time_used % 60}s`;
    const diffLabel = { easy: '🟢 Easy', medium: '🟡 Medium', hard: '🔴 Hard' }[game.difficulty];

    // Get leaderboard for this difficulty
    const memoryStats = state.games.stats?.memory || {};
    const leaderboard = (memoryStats.leaderboard || [])
        .filter(e => e.difficulty === game.difficulty)
        .sort((a, b) => b.score - a.score)
        .slice(0, 3);

    const isNewBest = game.score === (leaderboard[0]?.score || 0);
    const personalBest = leaderboard[0]?.score || 0;

    // Calculate rank (find position in leaderboard)
    const allDifficultyScores = (state.games.stats?.memory?.leaderboard || [])
        .filter(e => e.difficulty === game.difficulty)

window.initializeScrambleGame = function(difficulty) {
    const config = {
        easy: { minLen: 3, maxLen: 5, time: 20 },
        medium: { minLen: 5, maxLen: 7, time: 20 },
        hard: { minLen: 8, maxLen: 20, time: 20 }
    };
    const settings = config[difficulty] || config.easy;

    // Extract words from trivia bank, filter by difficulty
    const words = [];
    const seen = new Set();

    TRIVIA_QUESTION_BANK.forEach(q => {
        const answer = q.correct.toLowerCase().trim();
        // Only use single-word answers
        if (!answer.includes(' ') && !seen.has(answer) &&
            answer.length >= settings.minLen && answer.length <= settings.maxLen) {
            words.push(answer);
            seen.add(answer);
        }
    });

    // Select 5 random unique words
    const selectedWords = [];
    for (let i = 0; i < 5 && words.length > 0; i++) {
        const idx = Math.floor(Math.random() * words.length);
        selectedWords.push(words[idx]);
        words.splice(idx, 1);
    }

    // If not enough words, repeat some (shouldn't happen with large bank)
    while (selectedWords.length < 5) {
        const allWords = Array.from(seen);
        selectedWords.push(allWords[Math.floor(Math.random() * allWords.length)]);
    }

    // Create word objects with anagrams
    const wordObjects = selectedWords.map((word, i) => ({
        id: i,
        original: word,
        scrambled: scrambleWord(word),
        attempts: 0,
        correct: false,
        timeTaken: 0
    }));

    return {
        gameId: 'scramble',
        difficulty: difficulty,
        gameState: 'playing',
        words: wordObjects,
        currentWordIndex: 0,
        settings: settings,
        score: 0,
        totalTime: 5 * settings.time, // 5 words × 20s each
        timerStartTime: Date.now(),
        wordStartTime: Date.now(),
        selectedBoost: null,
        boostUsed: false,
        stats: {
            words_correct: 0,
            total_words: 5,
            time_used: 0
        }
    };
};

window.scrambleWord = function(word) {
    let scrambled = word.split('');
    for (let attempts = 0; attempts < 3; attempts++) {
        // Fisher-Yates shuffle
        for (let i = scrambled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [scrambled[i], scrambled[j]] = [scrambled[j], scrambled[i]];
        }
        // Ensure scrambled ≠ original
        if (scrambled.join('') !== word) {
            return scrambled.join('');
        }
    }
    // Fallback: return with first two swapped
    if (scrambled.length > 1) {
        [scrambled[0], scrambled[1]] = [scrambled[1], scrambled[0]];
    }
    return scrambled.join('');
};

    }

    // Focus input
    setTimeout(() => document.getElementById('scr-input')?.focus(), 100);

    // Start timer if not already running
    if (!window._scrambleTimer) {
        game.wordStartTime = Date.now();
        window._scrambleTimer = setInterval(() => {
            const elapsed = Math.floor((Date.now() - game.wordStartTime) / 1000);
            const timeRemaining = Math.max(0, game.settings.time - elapsed);

            const timerEl = document.getElementById('scr-timer');
            if (timerEl) {
                const gameColor = timeRemaining > game.settings.time / 2 ? 'var(--theme-primary)' : timeRemaining > game.settings.time / 4 ? '#F59E0B' : '#EF4444';
                timerEl.textContent = timeRemaining + 's';
                timerEl.style.color = gameColor;
            }

            if (timeRemaining <= 0) {
                clearInterval(window._scrambleTimer);
                window._scrambleTimer = null;
                advanceScrambleWord();
            }
        }, 100);
    }
};

window.submitScrambleAnswer = function() {
    const game = window._scrambleGame;
    const word = game.words[game.currentWordIndex];
    const input = document.getElementById('scr-input')?.value?.toLowerCase().trim() || '';

    if (!input) return;

    // Check if correct
    if (input === word.original) {
        // Correct!
        word.correct = true;
        game.stats.words_correct++;

        // Calculate points
        const elapsed = Math.floor((Date.now() - game.wordStartTime) / 1000);
        const timeRemaining = Math.max(0, game.settings.time - elapsed);
        const timeBonus = timeRemaining / game.settings.time;
        const diffMultiplier = { easy: 1, medium: 1.5, hard: 2 }[game.difficulty];
        const basePoints = 10;
        const pointsAwarded = Math.max(0, Math.floor(basePoints * timeBonus * diffMultiplier));

        game.score += pointsAwarded;

        // Update UI - green
        const input_el = document.getElementById('scr-input');
        const word_el = document.getElementById('scr-word');
        if (input_el && word_el) {
            input_el.style.background = '#DCFCE7';
            input_el.style.borderColor = '#16A34A';
            input_el.disabled = true;
            word_el.textContent = word.original.toUpperCase();
            word_el.style.color = 'var(--theme-primary)';
        }

        // Update score
        const scoreEl = document.getElementById('scr-score');
        if (scoreEl) scoreEl.textContent = game.score;

        // Advance after delay
        setTimeout(() => {
            clearInterval(window._scrambleTimer);
            window._scrambleTimer = null;
            game.currentWordIndex++;
            if (game.currentWordIndex >= 5) {
                endScrambleGame(game);
            } else {
                game.wordStartTime = Date.now();
                renderScrambleGame(game);
            }
        }, 1500);
    } else {
        // Wrong
        word.attempts++;

        // Update UI - red flash
        const input_el = document.getElementById('scr-input');
        if (input_el) {
            input_el.style.background = '#FEE2E2';
            input_el.style.borderColor = '#DC2626';
            setTimeout(() => {
                input_el.style.background = 'white';
                input_el.style.borderColor = 'var(--border-darker)';
                input_el.value = '';
                input_el.focus();
            }, 300);
        }

        // Auto-advance on 3 attempts
        if (word.attempts >= 3) {
            setTimeout(() => {
                clearInterval(window._scrambleTimer);
                window._scrambleTimer = null;
                advanceScrambleWord();
            }, 500);
        } else {
            renderScrambleGame(game);
        }
    }
};

window.advanceScrambleWord = function() {
    const game = window._scrambleGame;
    game.currentWordIndex++;
    if (game.currentWordIndex >= 5) {
        endScrambleGame(game);
    } else {
        game.wordStartTime = Date.now();
        renderScrambleGame(game);
    }
};

window.skipScrambleWord = function() {
    const game = window._scrambleGame;
    const word = game.words[game.currentWordIndex];
    word.correct = false; // Don't count as correct, but advance
    advanceScrambleWord();
};

window.quitScrambleGame = function() {

};

window.updateScrambleLeaderboard = function(game) {
    if (!state.games.stats) state.games.stats = {};
    if (!state.games.stats.scramble) {
        state.games.stats.scramble = {
            played: 0,
            bestScore: 0,
            leaderboard: []
        };
    }

    const scrambleStats = state.games.stats.scramble;

    // Add new score to leaderboard
    const entry = {
        score: game.score,
        difficulty: game.difficulty,
        date: todayStr(),
        won: game.stats.words_correct >= 4
    };

    scrambleStats.leaderboard.push(entry);

    // Keep top 5 scores per difficulty
    const byDifficulty = {
        easy: [],
        medium: [],
        hard: []
    };

    scrambleStats.leaderboard.forEach(e => {
        if (byDifficulty[e.difficulty]) {
            byDifficulty[e.difficulty].push(e);
        }
    });

    ['easy', 'medium', 'hard'].forEach(diff => {
        byDifficulty[diff]
            .sort((a, b) => b.score - a.score)
            .slice(0, 5);
    });

    scrambleStats.leaderboard = [];
    ['easy', 'medium', 'hard'].forEach(diff => {
        byDifficulty[diff].forEach(e => {
            scrambleStats.leaderboard.push(e);
        });
    });

    // Update personal best
    const personalBest = scrambleStats.leaderboard
        .filter(e => e.difficulty === game.difficulty)
        .reduce((max, e) => Math.max(max, e.score), 0);

    scrambleStats.bestScore = personalBest;
    scrambleStats.played = (scrambleStats.played || 0) + 1;

    saveState();
};

// Play the next game in the sequence
window.playNextChallengeGame = function() {
    const challenge = window._challengeGame;
    if (!challenge) return;

    if (challenge.currentGameIndex >= challenge.games.length) {
        // All games complete - show results
        endChallengeGame(challenge);
        return;
    }

    if (challenge.lives <= 0) {
        // Out of lives - game over
        challenge.gameState = 'lost';
        endChallengeGame(challenge);
        return;
    }

    const gameType = challenge.games[challenge.currentGameIndex];
    const panel = document.getElementById('challenge-panel-content');
    if (!panel) return;

    // Display header with progress
    const gamesRemaining = challenge.games.length - challenge.currentGameIndex;
    const gameNum = challenge.currentGameIndex + 1;
    const lifeDisplay = '❤️'.repeat(challenge.lives) + '❌'.repeat(3 - challenge.lives);

    panel.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
            <div style="font-size:0.9em;color: var(--text-secondary);font-weight:600">Game ${gameNum}/3: ${gameType.toUpperCase()}</div>
            <div style="font-size:1.1em;font-weight:800">${lifeDisplay}</div>
        </div>
        <div style="background:var(--light);padding:12px;border-radius:8px;margin-bottom:16px">
            <div style="display:flex;justify-content:space-between">
                <div style="color: var(--text-secondary);font-size:0.85em">Running Score</div>
                <div style="color:var(--theme-primary);font-weight:800;font-size:1.3em">${challenge.score}</div>
            </div>
        </div>
        <div id="mini-game-content" style="background:var(--bg-light-extra);padding:16px;border-radius:12px">Loading game...</div>
    `;

    // Load the appropriate mini-game based on gameType
    setTimeout(() => {
        const contentDiv = document.getElementById('mini-game-content');
        if (!contentDiv) return;

        switch(gameType) {
            case 'wordle':
                loadChallengeWordleGame(contentDiv);
                break;
            case 'memory':
                loadChallengeMemoryGame(contentDiv);
                break;
            case 'scramble':
                loadChallengeScrambleGame(contentDiv);
                break;
        }
    }, 100);
};

// Submit a guess/answer in the mini-game
window.submitChallengeMiniGameGuess = function(gameType) {
    const challenge = window._challengeGame;
    const miniGame = window._challengeMiniGame;
    if (!challenge || !miniGame) return;

    let isCorrect = false;
    let pointsAwarded = 0;

    if (gameType === 'wordle') {
        const input = document.getElementById('wordle-input');
        if (!input || miniGame.gameState !== 'playing') return;

        const guess = input.value.trim().toUpperCase();
        if (guess.length !== 5) {
            alert('Enter a 5-letter word');
            return;
        }

        wordleSubmitGuess(miniGame, guess);
        input.value = '';

        isCorrect = miniGame.gameState === 'won';
        pointsAwarded = miniGame.score || 0;
    } else if (gameType === 'scramble') {
        const input = document.getElementById('scramble-input');
        if (!input || miniGame.gameState !== 'playing') return;

        const guess = input.value.trim().toLowerCase();
        const currentWord = miniGame.words[miniGame.currentWordIndex];
        if (!currentWord) return;

        const isCorrectAnswer = guess === currentWord.original.toLowerCase();
        if (isCorrectAnswer) {
            miniGame.words[miniGame.currentWordIndex].correct = true;
            miniGame.words[miniGame.currentWordIndex].timeTaken = Math.max(0, Math.floor((20000 - (Date.now() - miniGame.wordStartTime)) / 1000));
            const timeBonus = miniGame.words[miniGame.currentWordIndex].timeTaken / 20;
            const diffMultiplier = miniGame.difficulty === 'easy' ? 1 : miniGame.difficulty === 'medium' ? 1.5 : 2;
            pointsAwarded = Math.floor(10 * timeBonus * diffMultiplier);
            miniGame.score += pointsAwarded;
            miniGame.wordsCorrect++;

            isCorrect = true;
            advanceScrambleWord(miniGame);
        } else {
            miniGame.words[miniGame.currentWordIndex].attempts++;
            if (miniGame.words[miniGame.currentWordIndex].attempts >= 3) {
                advanceScrambleWord(miniGame);
            }
        }

        input.value = '';
    }

    // Update challenge score
    if (isCorrect) {
        challenge.score += pointsAwarded;
        // Bonus for clean win (no mistakes)
        if (miniGame.gameState !== 'lost' && !miniGame.stats?.mistakes) {
            challenge.score += 100;
        }
    } else {
        challenge.lives--;
    }

    // Update display
    const panel = document.getElementById('challenge-panel-content');
    if (panel) {
        const gameType = challenge.games[challenge.currentGameIndex];
        const gamesRemaining = challenge.games.length - challenge.currentGameIndex;
        const gameNum = challenge.currentGameIndex + 1;
        const lifeDisplay = '❤️'.repeat(Math.max(0, challenge.lives)) + '❌'.repeat(Math.max(0, 3 - challenge.lives));

        const contentDiv = document.getElementById('mini-game-content');
        if (contentDiv) {
            if (gameType === 'wordle') {
                contentDiv.innerHTML = renderWordleGame(miniGame);
                if (miniGame.gameState === 'playing') {
                    const input = document.getElementById('wordle-input');
                    if (input) {
                        input.focus();
                        input.onclick = () => submitChallengeMiniGameGuess('wordle');
                    }
                }
            } else if (gameType === 'scramble') {
                contentDiv.innerHTML = renderScrambleGame(miniGame);
                if (miniGame.gameState === 'playing') {
                    const input = document.getElementById('scramble-input');
                    if (input) input.focus();
                }
            }
        }

        // Update score and lives display
        const scoreEl = panel.querySelector('div:last-child');
        if (scoreEl) {
            scoreEl.innerHTML = `
                <div style="font-size:0.9em;color: var(--text-secondary);font-weight:600">Game ${gameNum}/3: ${gameType.toUpperCase()}</div>
                <div style="font-size:1.1em;font-weight:800;margin-top:8px">${lifeDisplay}</div>
            `;
        }
    }

    // Check if mini-game is complete
    if (miniGame.gameState !== 'playing') {
        setTimeout(() => {
            challenge.gameScores[challenge.games[challenge.currentGameIndex]] = miniGame.score;
            challenge.gameWins[challenge.games[challenge.currentGameIndex]] = miniGame.gameState === 'won';
            challenge.currentGameIndex++;
            challenge.stats.gamesPlayed++;
            if (miniGame.gameState === 'won') {
                challenge.stats.gamesWon++;
            }

            playNextChallengeGame();
        }, 1000);
    }
};

// End Challenge Mode and show results
window.endChallengeGame = function(challenge) {
    if (!challenge) challenge = window._challengeGame;
    if (!challenge) return;

    // Bonus points
    challenge.score += (challenge.lives * 50); // 50 pts per remaining life

    // Final state
    challenge.gameState = challenge.lives > 0 && challenge.currentGameIndex >= challenge.games.length ? 'won' : 'lost';
    challenge.stats.totalTime = Math.floor((Date.now() - challenge.timerStartTime) / 1000);

    // Record gameplay
    recordGamePlay('challenge', challenge.score, challenge.gameState === 'won');
    awardPoints(challenge.score);
    updateChallengeLeaderboard(challenge);

    // Show results
    showChallengeResults(challenge);
};

// Update Challenge Mode leaderboard
window.updateChallengeLeaderboard = function(challenge) {
    if (!state.games.stats) state.games.stats = {};
    if (!state.games.stats.challenge) {
        state.games.stats.challenge = {
            played: 0,
            bestScore: 0,
            leaderboard: []
        };
    }

    const challengeStats = state.games.stats.challenge;

    const entry = {
        score: challenge.score,
        difficulty: challenge.difficulty,
        date: todayStr(),
        won: challenge.gameState === 'won',
        gamesWon: challenge.stats.gamesWon,
        lives: challenge.lives
    };

    challengeStats.leaderboard.push(entry);
    challengeStats.leaderboard.sort((a, b) => b.score - a.score).slice(0, 10); // Keep top 10
    challengeStats.bestScore = Math.max(challengeStats.bestScore || 0, challenge.score);
    challengeStats.played = (challengeStats.played || 0) + 1;

    saveState();
};

// ── SEASONAL CONTENT & DAILY BONUS ─────────────────
window.checkDailyBonus = function() {
    if (!state.games) state.games = { unlocked: [], stats: {} };
    if (!state.games.dailyBonus) {
        state.games.dailyBonus = { lastClaimedDate: null, streak: 0, claimed: false };
    }

    const today = todayStr();
    const lastClaimed = state.games.dailyBonus.lastClaimedDate;
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    const yStr = yesterday.toISOString().split('T')[0];

    // Check if already claimed today
    if (state.games.dailyBonus.claimed && state.games.dailyBonus.lastClaimedDate === today) {
        return false; // Already claimed
    }

    // Update streak
    if (lastClaimed === yStr) {
        state.games.dailyBonus.streak++;
    } else if (lastClaimed !== today) {
        state.games.dailyBonus.streak = 1;
    }

    state.games.dailyBonus.lastClaimedDate = today;
    state.games.dailyBonus.claimed = true;
    saveState();

    return true; // Eligible for bonus
};

window.awardDailyBonus = function() {
    // Award 10 bonus points on first game of day
    if (checkDailyBonus()) {
        const streak = state.games.dailyBonus.streak;
        const bonusPoints = 10;
        state.points.today += bonusPoints;
        saveState();

        // Show celebratory notification
        showDailyBonusToast(bonusPoints, streak);
        return bonusPoints;
    }
    return 0;
};

window.showDailyBonusToast = function(bonusPoints, streak) {
    // Create daily bonus toast notification

        }

window.getSeasonalTheme = function() {
    if (!state.games) state.games = { unlocked: [], stats: {} };
    if (!state.games.seasonal) {
        state.games.seasonal = { theme: 'default' };
    }

    const themes = {
        spring: { primary: 'var(--theme-primary)', accent: '#BFDBFE', name: 'Spring 🌱' },
        summer: { primary: '#FBBF24', accent: '#FEF3C7', name: 'Summer ☀️' },
        fall: { primary: '#F97316', accent: '#FED7AA', name: 'Fall 🍂' },
        winter: { primary: '#0EA5E9', accent: '#BAE6FD', name: 'Winter ❄️' },
        default: { primary: '#0EA5E9', accent: '#BFDBFE', name: 'Default' }
    };

    // Auto-detect season from current month
    const month = new Date().getMonth();
    let currentSeason = 'default';
    if (month >= 2 && month <= 4) currentSeason = 'spring';
    else if (month >= 5 && month <= 7) currentSeason = 'summer';
    else if (month >= 8 && month <= 10) currentSeason = 'fall';
    else currentSeason = 'winter';

    // Use stored theme preference if set
    if (state.games.seasonal.theme && state.games.seasonal.theme !== 'auto') {
        return themes[state.games.seasonal.theme] || themes.default;
    }

    return themes[currentSeason];
};

// Get the upcoming holiday and apply its theme
window.getUpcomingHolidayTheme = function() {
    const today = new Date();
    const currentYear = today.getFullYear();
    let upcomingHoliday = null;
    let daysUntil = Infinity;

    const allHolidays = [...window.HOLIDAY_DATABASE.american, ...window.HOLIDAY_DATABASE.indian];

    for (const holiday of allHolidays) {
        const [month, day] = holiday.date.split('-');
        const holidayDate = new Date(currentYear, parseInt(month) - 1, parseInt(day));

        if (holidayDate < today) {
            holidayDate.setFullYear(currentYear + 1);
        }

        const diff = Math.floor((holidayDate - today) / (1000 * 60 * 60 * 24));

        if (diff >= 0 && diff < daysUntil) {
            daysUntil = diff;
            upcomingHoliday = {
                ...holiday,
                daysUntil: diff,
                date: holidayDate
            };
        }
    }

    return upcomingHoliday;
};

// Determine if a color is light or dark (for text contrast)
window.getTextColorForBackground = function(hexColor) {
    // Convert hex to RGB
    const hex = hexColor.replace('#', '');
    const r = parseInt(hex.substring(0, 2), 16);
    const g = parseInt(hex.substring(2, 4), 16);
    const b = parseInt(hex.substring(4, 6), 16);

    // Calculate brightness using relative luminance formula
    const brightness = (r * 299 + g * 587 + b * 114) / 1000;

    // If brightness > 155, use dark text; otherwise use white
    return brightness > 155 ? 'var(--dark)' : '#FFFFFF';
};

function addDays(dateStr, days) {
    const d = new Date(dateStr + 'T12:00:00');
    d.setDate(d.getDate() + days);
    return d.toISOString().split('T')[0];
}

function loadState() {
    try {
        const raw = localStorage.getItem(LS_KEY);
        if (raw) {
            state = JSON.parse(raw);
            applyResets();
            return;
        }
    } catch (e) { console.warn('State parse error', e); }
    state = buildDefaultState();
    applyResets();
    saveState();
}

function saveState() {
    localStorage.setItem(LS_KEY, JSON.stringify(state));
}

function applyResets() {
    const today = todayStr();
    const weekStart = getMondayOfWeek(today);
    const month = today.slice(0, 7);

    // Ensure trivia onboarding object exists (for migration from old state)
    if (!state.trivia) state.trivia = {};
    if (!state.trivia.onboarding) {
        state.trivia.onboarding = {
            completed: false,
            setupDate: null,
            name: '',
            avatar: '🧠',
            step1Complete: false,
            milestones: { firstQuestion: false, firstStreak: false, firstBadge: false },
            showTTS: true,
            showHighContrast: false,
        };
    }
    // Ensure step1Complete exists for old saves
    if (state.trivia.onboarding && state.trivia.onboarding.step1Complete === undefined) {
        state.trivia.onboarding.step1Complete = state.trivia.onboarding.completed;
    }
    if (!state.trivia.badges) {
        state.trivia.badges = { byCategory: {}, special: {} };
    }
    if (!state.trivia.difficulty) {
        state.trivia.difficulty = {
            currentMode: 'rookie',
            proUnlocked: false,
            proUnlockedDate: null,
            legendUnlocked: false,
            legendUnlockedDate: null,
        };
    }
    if (!state.trivia.goals) {
        state.trivia.goals = [];
    }

    // Ensure games state exists (migration for old saves)
    if (!state.games) {
        state.games = {
            unlocked: [],
            stats: {},
        };
    }
    if (!state.boosts) {
        state.boosts = {
            points: 0,
            double_points: 0,
            skip: 0,
            extra_time: 0,
            hint: 0,
            combo_freeze: 0,
        };
    }
    // Give new users a welcome boost
    if (!state.boosts.initialized) {
        state.boosts.hint = 3; // Welcome gift: 3 free hints
        state.boosts.initialized = true;
    }

    // Daily reset
    if (state.date !== today) {
        // Reset chore completion
        ['morning','afternoon','evening'].forEach(block => {
            state.chores[block].forEach(c => { c.done = false; });
        });
        // Reset daily points (carry week/month/total)
        state.points.today = 0;
        // Reset Kung Fu daily goals
        state.kungfu.todayPractice   = false;
        state.kungfu.todayFlashcards = false;
        state.kungfu.todayStudy      = false;
        state.kungfu.practiceMinutes = 0;
        state.kungfu.studyMinutes    = 0;
        // Reset mood today
        state.mood.today = null;
        // Reset Gujarati daily timer
        state.gujarati.todayMinutes = 0;
        state.gujarati.timerRunning = false;
        state.gujarati.timerStart   = null;
        // Stop any running pomodoro
        state.pomodoro = null;
        // Reset habit today flags
        Object.values(state.habits).forEach(h => {
            h.todayDone = false;
            if (h.todayCount !== undefined) h.todayCount = 0;
            if (h.todayGlasses !== undefined) h.todayGlasses = 0;
        });
        // Reading: reset daily minutes
        if (state.reading) {
            state.reading.dailyMinutes = 0;
        }
        state.date = today;
    }

    // Trivia: streak/question management now handled by IndexedDB engine (initTriviaSystem)
    // state.trivia kept only for migration data (streak/totalAnswered from old localStorage)

    // Weekly reset
    if (state.weekStart !== weekStart) {
        Object.values(state.habits).forEach(h => { h.weekDays = []; });
        // Reading: reset weekly minutes and log the previous week
        if (state.reading) {
            if (state.reading.weeklyMinutes > 0) {
                if (!state.reading.history) state.reading.history = [];
                state.reading.history.push({
                    week: state.weekStart,
                    minutes: state.reading.weeklyMinutes
                });
            }
            state.reading.weeklyMinutes = 0;
        }
        state.weekStart = weekStart;
    }

    // Monthly reset
    if (state.month !== month) {
        state.points.month = 0;
        state.month = month;
    }
}

function h(tag, cls, html) {
    return `<${tag} class="${cls}">${html}</${tag}>`;
}

function formatDate(dateStr) {
    const d = new Date(dateStr + 'T12:00:00');
    return d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' });
}

function getDayLabel(dateStr) {
    const d = new Date(dateStr + 'T12:00:00');
    return d.toLocaleDateString('en-GB', { weekday:'short' });
}

function getDayNum(dateStr) {
    return new Date(dateStr + 'T12:00:00').getDate();
}

function getMonthLabel(dateStr) {
    return new Date(dateStr + 'T12:00:00').toLocaleDateString('en-GB', { month:'short' });
}

function getDueStatus(dueDate) {
    const today = todayStr();
    if (dueDate < today) return { text:'Overdue!', cls:'urgent' };
    if (dueDate === today) return { text:'Due today!', cls:'urgent' };
    const diff = Math.round((new Date(dueDate + 'T12:00:00') - new Date(today + 'T12:00:00')) / 86400000);
    if (diff === 1) return { text:'Due tomorrow', cls:'warning' };
    return { text:'Due ' + formatDate(dueDate), cls:'' };
}

function getTier(monthlyPts) {
    return TIER_LEVELS.find(t => monthlyPts >= t.min) || TIER_LEVELS[TIER_LEVELS.length - 1];
}

function getNextTier(monthlyPts) {
    const tiers = [...TIER_LEVELS].reverse();
    for (let i = 0; i < tiers.length; i++) {
        if (monthlyPts < tiers[i].min) return tiers[i];
    }
    return null;
}

function allChoresCount() {
    return Object.values(state.chores).flat();
}

function doneChoresCount() {
    return allChoresCount().filter(c => c.done).length;
}

function getWeekDayGrid() {
    const today = todayStr();
    const monday = getMondayOfWeek(today);
    const days = [];
    for (let i = 0; i < 7; i++) {
        days.push(addDays(monday, i));
    }
    return days;
}

function uid() {
    return 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
}

function addPoints(pts) {
    state.points.today += pts;
    state.points.week  += pts;
    state.points.month += pts;
    state.points.total += pts;
    saveState();
    updateBoardHeader();
    // Animate badge
    const el = document.getElementById('board-pts-chip');
    if (el) { el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop'); }
}

function subtractPoints(pts) {
    state.points.today = Math.max(0, state.points.today - pts);
    state.points.week  = Math.max(0, state.points.week  - pts);
    state.points.month = Math.max(0, state.points.month - pts);
    state.points.total = Math.max(0, state.points.total - pts);
    saveState();
    updateBoardHeader();
}

function playTick() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.frequency.value = 880;
        g.gain.value = 0.15;
        osc.start(); osc.stop(ctx.currentTime + 0.08);
    } catch(e) {}
}

function playDone() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [523, 659, 784].forEach((freq, i) => {
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.connect(g); g.connect(ctx.destination);
            osc.frequency.value = freq;
            g.gain.value = 0.2;
            osc.start(ctx.currentTime + i * 0.12);
            osc.stop(ctx.currentTime + i * 0.12 + 0.15);
        });
    } catch(e) {}
}

    if (dEl) dEl.textContent = now.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' });

    // Update profile button with current avatar
    const profileBtn = document.getElementById('profile-btn');
    if (profileBtn) profileBtn.textContent = state.trivia.onboarding.avatar || '🧠';

    // Update dashboard profile chip with avatar and nickname
    const dashProfileAvatar = document.getElementById('dash-profile-avatar');
    const dashProfileName = document.getElementById('dash-profile-name');
    if (dashProfileAvatar) dashProfileAvatar.textContent = state.trivia.onboarding.avatar || '🧠';
    if (dashProfileName) dashProfileName.textContent = state.trivia.onboarding.name || 'Profile';

    // Update board header profile chip with avatar and nickname
    const boardProfileAvatar = document.getElementById('board-profile-avatar');
    const boardProfileName = document.getElementById('board-profile-name');
    if (boardProfileAvatar) boardProfileAvatar.textContent = state.trivia.onboarding.avatar || '🧠';
    if (boardProfileName) boardProfileName.textContent = state.trivia.onboarding.name || 'Profile';

    // Update points display in new dashboard header chip
    const dashPtsNum = document.getElementById('dash-pts-num');
    if (dashPtsNum) dashPtsNum.textContent = state.points.today;

    // Update daily streak and bonus display
    const dailyStreakEl = document.getElementById('dash-daily-streak');
    const bonusStatusEl = document.getElementById('dash-bonus-status');
    if (state.games && state.games.dailyBonus) {
        const streak = state.games.dailyBonus.streak || 0;
        if (dailyStreakEl) dailyStreakEl.textContent = streak;

        if (bonusStatusEl) {
            const today = todayStr();
            const claimed = state.games.dailyBonus.claimed && state.games.dailyBonus.lastClaimedDate === today;
            bonusStatusEl.textContent = claimed ? '✓ Claimed' : 'Ready';
            bonusStatusEl.style.color = claimed ? 'rgba(255, 255, 255, 0.7)' : '#FFD700';
        }
    }

    const all  = allChoresCount();
    const done = doneChoresCount();
    const hEl = document.getElementById('hdr-pts');
    if (hEl) hEl.textContent = state.points.today;
    const bEl = document.getElementById('daily-bar');
    if (bEl) bEl.style.width = Math.min(100, (state.points.today / DAILY_GOAL_PTS) * 100) + '%';
    const blEl = document.getElementById('daily-bar-left');
    if (blEl) blEl.textContent = done + ' / ' + all.length + ' chores done';
    const brEl = document.getElementById('daily-bar-right');
    if (brEl) brEl.textContent = 'Goal: ' + DAILY_GOAL_PTS + ' pts';

    renderDashChores();
    renderDashHomework();
    renderDashPomoMini();
    renderDashHabits();
    renderDashMood();
    renderDashGujarati();
    renderDashCalendar();
    renderDashKungFu();
    renderDashTrivia();
    renderDashReading();
    renderDashPoints();
    // Initialize trivia system (IndexedDB + question buffer)
    initTriviaSystem().then(() => renderDashTrivia());
}
