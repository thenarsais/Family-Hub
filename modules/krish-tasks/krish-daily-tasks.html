<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Krish's Daily Tasks — Family Hub</title>
    <style>
        :root {
            --primary: #6366F1;
            --primary-light: #818CF8;
            --secondary: #EC4899;
            --accent: #F59E0B;
            --success: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
            --info: #3B82F6;
            --purple: #8B5CF6;
            --orange: #F97316;
            --teal: #14B8A6;
            --dark: #1E293B;
            --mid: #475569;
            --muted: #94A3B8;
            --light: #F1F5F9;
            --white: #FFFFFF;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.12);
            --t: all 0.2s ease;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html { font-size: 16px; }
        body { font-family:var(--font); background:#0F172A; min-height:100vh; color:var(--dark); overflow-x:hidden; }

        /* ── VIEWS ─────────────────────────────── */
        .view { display:none; min-height:100vh; }
        .view.active { display:block; }
        .hidden { display:none !important; }

        /* ── DASHBOARD ─────────────────────────── */
        #view-dashboard { background:linear-gradient(160deg,#1E293B 0%,#0F172A 100%); padding-bottom:30px; }

        .dash-header {
            background: linear-gradient(135deg,#4F46E5,#7C3AED);
            padding: 20px 18px 18px;
            color: white;
        }
        .dash-header-row { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
        .dash-greeting h1 { font-size:1.75em; font-weight:800; line-height:1.1; }
        .dash-greeting .date-sub { font-size:0.88em; opacity:0.85; margin-top:3px; }
        .pts-badge {
            background:rgba(255,255,255,0.18);
            border:2px solid rgba(255,255,255,0.35);
            border-radius:30px;
            padding:8px 16px;
            text-align:center;
            cursor:pointer;
            transition:var(--t);
        }
        .pts-badge:active { transform:scale(0.97); }
        .pts-badge .num { font-size:1.6em; font-weight:800; line-height:1; display:block; }
        .pts-badge .lbl { font-size:0.7em; opacity:0.85; text-transform:uppercase; letter-spacing:0.5px; }
        .dash-bar-wrap { background:rgba(255,255,255,0.22); border-radius:10px; height:8px; overflow:hidden; margin-bottom:6px; }
        .dash-bar-fill { height:100%; background:var(--accent); border-radius:10px; transition:width 0.6s ease; }
        .dash-bar-labels { display:flex; justify-content:space-between; font-size:0.78em; opacity:0.88; }

        /* Dashboard Grid */
        .dash-grid { padding:14px; display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .dash-card {
            background:#1E293B;
            border-radius:var(--radius);
            padding:15px;
            cursor:pointer;
            transition:var(--t);
            border:2px solid transparent;
            position:relative;
            overflow:hidden;
            min-height:108px;
            display:flex;
            flex-direction:column;
        }
        .dash-card:active { transform:scale(0.96); }
        .dash-card:hover { border-color:rgba(99,102,241,0.35); }
        .dash-card::before {
            content:'';
            position:absolute;
            top:0; left:0; right:0;
            height:3px;
            border-radius:var(--radius) var(--radius) 0 0;
        }
        .dc-chores::before  { background:linear-gradient(90deg,#F59E0B,#EF4444); }
        .dc-points::before  { background:linear-gradient(90deg,#F59E0B,#FBBF24); }
        .dc-hw::before      { background:linear-gradient(90deg,#10B981,#34D399); }
        .dc-guj::before     { background:linear-gradient(90deg,#6366F1,#8B5CF6); }
        .dc-cal::before     { background:linear-gradient(90deg,#3B82F6,#06B6D4); }
        .dc-habits::before  { background:linear-gradient(90deg,#EC4899,#F43F5E); }
        .dc-mood::before    { background:linear-gradient(90deg,#8B5CF6,#A855F7); }

        /* Full-width mood card */
        .dc-mood { grid-column:1/-1; flex-direction:row; align-items:center; gap:14px; min-height:auto; }

        .card-tag { font-size:0.72em; font-weight:700; color:#64748B; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:3px; }
        .card-icon { font-size:1.8em; margin-bottom:4px; }
        .card-val { font-size:1.35em; font-weight:700; color:white; line-height:1.2; }
        .card-sub { font-size:0.78em; color:#64748B; margin-top:2px; }
        .card-bar { margin-top:8px; background:#334155; border-radius:6px; height:5px; overflow:hidden; flex-shrink:0; }
        .card-bar-fill { height:100%; border-radius:6px; transition:width 0.4s ease; }
        .card-badge-top {
            position:absolute; top:10px; right:10px;
            background:var(--accent); color:#1E293B;
            font-size:0.68em; font-weight:800;
            padding:2px 8px; border-radius:20px;
        }
        .card-badge-top.red { background:var(--danger); color:white; }

        .mood-emoji-big { font-size:3em; flex-shrink:0; }
        .mood-card-info { flex:1; min-width:0; }

        /* ── ACTIVITY BOARD ──────────────────────── */
        #view-board { background:#F1F5F9; padding-bottom:30px; }

        .board-hdr {
            background:linear-gradient(135deg,#4F46E5,#7C3AED);
            padding:14px 16px;
            display:flex; align-items:center; gap:10px;
            color:white;
            position:sticky; top:0; z-index:20;
        }
        .back-btn {
            background:rgba(255,255,255,0.2);
            border:2px solid rgba(255,255,255,0.4);
            color:white; border-radius:10px;
            padding:7px 13px; font-size:0.95em;
            font-weight:700; cursor:pointer;
            transition:var(--t); white-space:nowrap;
        }
        .back-btn:active { transform:scale(0.96); }
        .board-title { font-size:1.15em; font-weight:800; flex:1; }
        .board-pts-chip {
            background:var(--accent); color:#1E293B;
            font-weight:800; font-size:0.88em;
            padding:5px 13px; border-radius:20px;
            cursor:pointer; white-space:nowrap;
        }

        /* Tabs */
        .board-tabs {
            display:flex; gap:4px;
            padding:10px 12px 8px;
            background:white;
            overflow-x:auto; scrollbar-width:none;
            border-bottom:2px solid #E2E8F0;
            position:sticky; top:54px; z-index:15;
        }
        .board-tabs::-webkit-scrollbar { display:none; }
        .b-tab {
            display:flex; flex-direction:column; align-items:center; gap:2px;
            padding:7px 11px; border:2px solid transparent;
            background:#F8FAFC; border-radius:10px;
            cursor:pointer; white-space:nowrap;
            font-size:0.72em; font-weight:700; color:#64748B;
            min-width:58px; transition:var(--t);
        }
        .b-tab .ti { font-size:1.4em; }
        .b-tab.active { background:var(--primary); color:white; border-color:var(--primary); }

        /* Panels */
        .b-panel { display:none; padding:14px; }
        .b-panel.active { display:block; }

        /* Section headers */
        .sec-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
        .sec-title { font-size:1.2em; font-weight:800; color:var(--dark); }
        .sec-sub { font-size:0.82em; color:var(--mid); margin-top:2px; }

        /* ── CHORES ──────────────────────────────── */
        .chore-block { background:white; border-radius:var(--radius); overflow:hidden; margin-bottom:12px; box-shadow:var(--shadow); }
        .chore-blk-hdr {
            display:flex; align-items:center; gap:10px;
            padding:12px 15px; font-weight:700; font-size:0.9em;
        }
        .chore-blk-hdr.morning  { background:linear-gradient(135deg,#FEF3C7,#FDE68A); color:#78350F; }
        .chore-blk-hdr.afternoon{ background:linear-gradient(135deg,#DBEAFE,#BFDBFE); color:#1E40AF; }
        .chore-blk-hdr.evening  { background:linear-gradient(135deg,#EDE9FE,#DDD6FE); color:#4C1D95; }
        .blk-pts-badge { margin-left:auto; background:rgba(0,0,0,0.1); border-radius:20px; padding:2px 9px; font-size:0.82em; }
        .chore-item {
            display:flex; align-items:center; gap:12px;
            padding:13px 15px; border-bottom:1px solid #F1F5F9;
            cursor:pointer; user-select:none; transition:background 0.15s;
        }
        .chore-item:last-child { border-bottom:none; }
        .chore-item:active { background:#F8FAFC; }
        .chore-cb {
            width:28px; height:28px; border-radius:50%;
            border:3px solid #CBD5E1;
            display:flex; align-items:center; justify-content:center;
            flex-shrink:0; transition:var(--t); font-size:0.9em;
        }
        .chore-item.done .chore-cb { background:var(--success); border-color:var(--success); color:white; }
        .chore-ico { font-size:1.3em; }
        .chore-lbl { flex:1; font-size:0.97em; font-weight:600; color:var(--dark); }
        .chore-item.done .chore-lbl { text-decoration:line-through; color:#94A3B8; }
        .chore-pts { font-size:0.82em; font-weight:700; color:var(--accent); background:#FFFBEB; padding:3px 9px; border-radius:20px; }

        /* ── HOMEWORK ────────────────────────────── */
        .hw-add-form { background:white; border-radius:var(--radius); padding:15px; margin-bottom:14px; box-shadow:var(--shadow); }
        .form-row { display:flex; gap:8px; margin-bottom:8px; flex-wrap:wrap; }
        .f-input {
            flex:1; min-width:120px; padding:11px 13px;
            border:2px solid #E2E8F0; border-radius:10px;
            font-size:0.95em; font-family:var(--font);
            outline:none; transition:border-color 0.2s; background:white;
        }
        .f-input:focus { border-color:var(--primary); }
        .f-select {
            padding:11px 13px; border:2px solid #E2E8F0;
            border-radius:10px; font-size:0.95em;
            font-family:var(--font); background:white; outline:none;
        }
        .btn-add {
            padding:11px 18px; background:var(--primary);
            color:white; border:none; border-radius:10px;
            font-size:0.95em; font-weight:700; cursor:pointer;
            transition:var(--t); white-space:nowrap;
        }
        .btn-add:active { transform:scale(0.97); }

        .hw-item {
            background:white; border-radius:var(--radius);
            padding:13px 15px; margin-bottom:9px;
            box-shadow:var(--shadow); display:flex;
            gap:11px; align-items:flex-start; cursor:pointer;
        }
        .hw-cb {
            width:26px; height:26px; border-radius:8px;
            border:3px solid #CBD5E1; display:flex;
            align-items:center; justify-content:center;
            flex-shrink:0; transition:var(--t); margin-top:3px;
        }
        .hw-item.done .hw-cb { background:var(--success); border-color:var(--success); color:white; }
        .hw-info { flex:1; min-width:0; }
        .hw-subj {
            display:inline-block; padding:2px 9px;
            border-radius:20px; font-size:0.72em; font-weight:700;
            margin-bottom:3px;
        }
        .hw-title { font-size:0.97em; font-weight:600; color:var(--dark); }
        .hw-item.done .hw-title { text-decoration:line-through; color:#94A3B8; }
        .hw-due { font-size:0.78em; color:#64748B; margin-top:3px; }
        .hw-due.urgent { color:var(--danger); font-weight:700; }
        .hw-due.warning { color:var(--orange); font-weight:700; }
        .pomo-launch-btn {
            background:#FFF7ED; border:2px solid #FED7AA;
            border-radius:9px; padding:7px 11px;
            cursor:pointer; font-size:0.78em; font-weight:700;
            color:#C2410C; transition:var(--t); flex-shrink:0;
        }
        .pomo-launch-btn:active { transform:scale(0.95); }

        /* Pomodoro widget */
        .pomo-widget {
            background:linear-gradient(135deg,#1E293B,#0F172A);
            border-radius:var(--radius); padding:22px;
            text-align:center; margin-bottom:14px; color:white;
        }
        .pomo-for { font-size:0.8em; color:#94A3B8; margin-bottom:3px; font-weight:700; }
        .pomo-subj-lbl { font-size:1em; font-weight:700; color:white; margin-bottom:18px; }
        .pomo-ring { position:relative; width:130px; height:130px; margin:0 auto 14px; }
        .pomo-ring svg { transform:rotate(-90deg); width:130px; height:130px; }
        .pomo-ring circle { fill:none; stroke-width:9; }
        .pomo-ring .r-bg { stroke:#334155; }
        .pomo-ring .r-fill { stroke:#F97316; stroke-linecap:round; transition:stroke-dashoffset 0.9s linear; }
        .pomo-time {
            position:absolute; top:50%; left:50%;
            transform:translate(-50%,-50%);
            font-size:1.9em; font-weight:800;
        }
        .pomo-mode-lbl { font-size:0.72em; color:#94A3B8; margin-top:-4px; margin-bottom:14px; }
        .pomo-btns { display:flex; gap:8px; justify-content:center; }
        .pb {
            padding:9px 18px; border:none; border-radius:10px;
            font-size:0.93em; font-weight:700; cursor:pointer;
            transition:var(--t);
        }
        .pb:active { transform:scale(0.95); }
        .pb-start { background:#F97316; color:white; }
        .pb-pause { background:#F59E0B; color:white; }
        .pb-reset { background:#334155; color:#94A3B8; }

        /* ── KUNG FU ─────────────────────────────── */
        .kf-goals { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:14px; }
        .kf-goal {
            background:white; border-radius:var(--radius-sm);
            padding:14px 10px; text-align:center;
            box-shadow:var(--shadow); cursor:pointer;
            border:3px solid transparent; transition:var(--t);
        }
        .kf-goal.done { border-color:var(--success); background:#ECFDF5; }
        .kf-goal:active { transform:scale(0.96); }
        .kf-g-icon { font-size:1.8em; margin-bottom:6px; }
        .kf-g-name { font-size:0.82em; font-weight:700; color:var(--dark); }
        .kf-g-sub  { font-size:0.7em; color:#64748B; margin-top:2px; }
        .kf-goal.done .kf-g-name { color:var(--success); }

        /* Flash cards */
        .fc-section { background:white; border-radius:var(--radius); padding:16px; margin-bottom:12px; box-shadow:var(--shadow); }
        .fc-section-title { font-size:0.9em; font-weight:700; color:var(--mid); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:14px; }
        .fc-wrap { perspective:800px; height:160px; margin-bottom:10px; }
        .fc-card {
            width:100%; height:100%;
            position:relative; transform-style:preserve-3d;
            transition:transform 0.55s ease; cursor:pointer;
        }
        .fc-card.flipped { transform:rotateY(180deg); }
        .fc-front, .fc-back {
            position:absolute; width:100%; height:100%;
            backface-visibility:hidden; border-radius:12px;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center; padding:20px;
        }
        .fc-front { background:linear-gradient(135deg,#1E293B,#334155); color:white; }
        .fc-back  { background:linear-gradient(135deg,#059669,#10B981); color:white; transform:rotateY(180deg); }
        .fc-hint  { font-size:0.78em; opacity:0.7; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
        .fc-term  { font-size:1.9em; font-weight:800; }
        .fc-meaning { font-size:0.9em; text-align:center; line-height:1.4; }
        .fc-nav { display:flex; align-items:center; gap:8px; justify-content:center; }
        .fc-btn {
            padding:9px 16px; border:none; border-radius:9px;
            font-weight:700; font-size:0.88em; cursor:pointer;
            transition:var(--t);
        }
        .fc-btn:active { transform:scale(0.95); }
        .fc-flip { background:var(--primary); color:white; }
        .fc-prev { background:#E2E8F0; color:var(--dark); }
        .fc-next { background:var(--success); color:white; }
        .fc-counter { font-size:0.82em; color:#64748B; min-width:60px; text-align:center; font-weight:700; }

        /* Practice Log */
        .practice-form { background:white; border-radius:var(--radius); padding:15px; margin-bottom:12px; box-shadow:var(--shadow); }
        .dur-btns { display:flex; gap:7px; flex-wrap:wrap; }
        .dur-btn {
            padding:9px 15px; background:#F1F5F9;
            border:2px solid #E2E8F0; border-radius:9px;
            font-size:0.88em; font-weight:700; cursor:pointer;
            color:var(--dark); transition:var(--t);
        }
        .dur-btn.selected { background:var(--primary); border-color:var(--primary); color:white; }
        .dur-btn:active { transform:scale(0.96); }
        .log-btn {
            margin-top:10px; width:100%; padding:11px;
            background:var(--success); color:white;
            border:none; border-radius:10px; font-size:1em;
            font-weight:700; cursor:pointer; transition:var(--t);
        }
        .log-btn:active { transform:scale(0.98); }
        .practice-log-list { background:white; border-radius:var(--radius); padding:15px; box-shadow:var(--shadow); }
        .log-entry {
            display:flex; align-items:center; gap:10px;
            padding:9px 0; border-bottom:1px solid #F1F5F9;
            font-size:0.88em; color:var(--mid);
        }
        .log-entry:last-child { border-bottom:none; }

        /* ── GUJARATI ────────────────────────────── */
        .guj-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:9px; margin-bottom:14px; }
        .guj-stat {
            background:white; border-radius:var(--radius-sm);
            padding:13px; text-align:center; box-shadow:var(--shadow);
        }
        .guj-s-icon { font-size:1.6em; margin-bottom:4px; }
        .guj-s-val  { font-size:1.3em; font-weight:800; color:var(--primary); }
        .guj-s-lbl  { font-size:0.72em; color:#64748B; font-weight:600; }

        .guj-actions { display:grid; grid-template-columns:1fr 1fr 1fr; gap:9px; margin-bottom:14px; }
        .guj-action {
            background:white; border:3px solid #E2E8F0;
            border-radius:var(--radius); padding:18px 10px;
            text-align:center; cursor:pointer;
            transition:var(--t); text-decoration:none;
            display:block;
        }
        .guj-action:hover { border-color:var(--primary); }
        .guj-action:active { transform:scale(0.96); }
        .guj-a-icon { font-size:2.2em; margin-bottom:7px; }
        .guj-a-name { font-size:0.88em; font-weight:700; color:var(--dark); }
        .guj-a-sub  { font-size:0.7em; color:#64748B; margin-top:2px; }

        .guj-timer-section {
            background:white; border-radius:var(--radius);
            padding:15px; box-shadow:var(--shadow); margin-bottom:12px;
        }
        .guj-timer-display { font-size:2em; font-weight:800; color:var(--primary); text-align:center; margin:10px 0; }
        .guj-timer-btns { display:flex; gap:8px; }
        .guj-tbtn {
            flex:1; padding:10px; border:none; border-radius:9px;
            font-weight:700; font-size:0.9em; cursor:pointer;
            transition:var(--t);
        }
        .guj-tbtn:active { transform:scale(0.97); }
        .gtb-start { background:var(--primary); color:white; }
        .gtb-stop  { background:var(--danger); color:white; }
        .gtb-reset { background:#E2E8F0; color:var(--dark); }

        /* ── CALENDAR ────────────────────────────── */
        .cal-add-form { background:white; border-radius:var(--radius); padding:15px; margin-bottom:12px; box-shadow:var(--shadow); }
        .event-item {
            background:white; border-radius:var(--radius);
            padding:13px 15px; margin-bottom:9px;
            box-shadow:var(--shadow); display:flex;
            align-items:center; gap:13px;
        }
        .ev-date-block {
            background:#F1F5F9; border-radius:9px;
            padding:7px 10px; text-align:center;
            min-width:44px; flex-shrink:0;
        }
        .ev-day   { font-size:1.1em; font-weight:800; color:var(--dark); }
        .ev-month { font-size:0.62em; color:#64748B; text-transform:uppercase; font-weight:700; }
        .ev-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
        .ev-info  { flex:1; min-width:0; }
        .ev-title { font-size:0.97em; font-weight:700; color:var(--dark); }
        .ev-time  { font-size:0.78em; color:#64748B; margin-top:2px; }
        .ev-today-badge {
            background:var(--primary); color:white;
            font-size:0.68em; font-weight:800;
            padding:2px 8px; border-radius:20px;
            white-space:nowrap;
        }

        /* ── HABITS ──────────────────────────────── */
        .habit-card { background:white; border-radius:var(--radius); padding:15px; margin-bottom:12px; box-shadow:var(--shadow); }
        .habit-hdr { display:flex; align-items:center; gap:11px; margin-bottom:13px; }
        .habit-ico { font-size:1.9em; }
        .habit-info { flex:1; }
        .habit-name { font-size:1.05em; font-weight:700; color:var(--dark); }
        .habit-goal-lbl { font-size:0.78em; color:#64748B; }
        .streak-chip {
            background:linear-gradient(135deg,#FEF3C7,#FDE68A);
            border-radius:20px; padding:5px 11px;
            font-size:0.82em; font-weight:800; color:#78350F;
        }
        .habit-week { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; margin-bottom:11px; }
        .hday {
            aspect-ratio:1; border-radius:7px;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            font-size:0.68em; font-weight:700;
            border:2px solid #E2E8F0;
            background:#F8FAFC; color:#94A3B8;
            cursor:pointer; transition:var(--t);
        }
        .hday.done  { background:var(--success); border-color:var(--success); color:white; }
        .hday.today { border-color:var(--primary); color:var(--primary); }
        .hday.today.done { border-color:var(--success); color:white; }
        .hday.future { opacity:0.35; pointer-events:none; }
        .hday-lbl { line-height:1; }
        .hday-chk { font-size:1.1em; }

        .habit-counter {
            display:flex; align-items:center; gap:10px;
            background:#F8FAFC; border-radius:9px;
            padding:9px 13px;
        }
        .cntr-lbl { flex:1; font-size:0.88em; font-weight:600; color:var(--mid); }
        .cntr-val { font-size:1.25em; font-weight:800; color:var(--dark); min-width:34px; text-align:center; }
        .cntr-btn {
            width:34px; height:34px; border:2px solid #E2E8F0;
            background:white; border-radius:8px;
            font-size:1.2em; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            font-weight:700; transition:var(--t);
        }
        .cntr-btn:active { transform:scale(0.94); background:#F1F5F9; }

        /* ── MOOD ────────────────────────────────── */
        .mood-q { text-align:center; font-size:1.2em; font-weight:800; color:var(--dark); margin-bottom:18px; }
        .mood-grid { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:5px; margin-bottom:18px; }
        .mood-opt {
            aspect-ratio:1; border-radius:var(--radius);
            border:3px solid #E2E8F0;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            cursor:pointer; transition:var(--t);
            background:white; padding:4px;
        }
        .mood-opt:active { transform:scale(0.94); }
        .mood-opt.selected { border-color:var(--primary); background:#EEF2FF; transform:scale(1.04); }
        .mood-em { font-size:2em; margin-bottom:3px; }
        .mood-lbl { font-size:0.68em; font-weight:700; color:#64748B; text-align:center; line-height:1.2; }
        .mood-opt.selected .mood-lbl { color:var(--primary); }

        .mood-history { background:white; border-radius:var(--radius); padding:15px; box-shadow:var(--shadow); }
        .mood-h-title { font-size:0.82em; font-weight:700; color:#64748B; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:11px; }
        .mood-h-row { display:flex; gap:6px; }
        .mood-h-item { flex:1; text-align:center; }
        .mood-h-em { font-size:1.4em; }
        .mood-h-day { font-size:0.66em; color:#94A3B8; font-weight:700; }

        /* ── POINTS PANEL ────────────────────────── */
        .pts-tier-card {
            background:linear-gradient(135deg,#1E293B,#334155);
            border-radius:var(--radius); padding:22px;
            text-align:center; color:white; margin-bottom:14px;
            position:relative; overflow:hidden;
        }
        .pts-tier-card::after {
            content:attr(data-icon);
            position:absolute; font-size:7em;
            opacity:0.06; top:-10px; right:-5px;
        }
        .tier-icon-big { font-size:3.5em; margin-bottom:6px; }
        .tier-name-big { font-size:1.4em; font-weight:800; }
        .tier-pts-sub  { font-size:0.9em; opacity:0.7; margin-top:4px; }

        .pts-stats-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:9px; margin-bottom:14px; }
        .pts-stat {
            background:white; border-radius:var(--radius-sm);
            padding:13px; text-align:center; box-shadow:var(--shadow);
        }
        .pts-stat-val { font-size:1.4em; font-weight:800; color:var(--dark); }
        .pts-stat-lbl { font-size:0.72em; color:#64748B; font-weight:600; margin-top:2px; }

        .next-tier-card { background:white; border-radius:var(--radius); padding:15px; box-shadow:var(--shadow); }
        .nt-label { display:flex; justify-content:space-between; font-size:0.85em; font-weight:700; margin-bottom:8px; }
        .pbar { background:#E2E8F0; border-radius:10px; height:10px; overflow:hidden; }
        .pbar-fill { height:100%; border-radius:10px; background:linear-gradient(90deg,#6366F1,#8B5CF6); transition:width 0.5s ease; }

        .pts-how-to { background:white; border-radius:var(--radius); padding:15px; box-shadow:var(--shadow); margin-top:12px; }
        .how-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #F1F5F9; font-size:0.88em; }
        .how-row:last-child { border-bottom:none; }
        .how-pts { font-weight:700; color:var(--accent); }

        /* ── UTILITY ─────────────────────────────── */
        .card-white { background:white; border-radius:var(--radius); padding:15px; box-shadow:var(--shadow); margin-bottom:12px; }
        .lbl { font-size:0.82em; font-weight:700; color:var(--mid); display:block; margin-bottom:6px; }
        .empty-state { text-align:center; padding:36px 20px; color:#94A3B8; }
        .empty-ico { font-size:2.8em; margin-bottom:7px; }
        .empty-txt { font-size:0.95em; font-weight:600; }
        .chip { display:inline-block; padding:2px 9px; border-radius:20px; font-size:0.75em; font-weight:700; }
        .chip-g { background:#DCFCE7; color:#166534; }
        .chip-y { background:#FEF9C3; color:#854D0E; }
        .chip-r { background:#FEE2E2; color:#991B1B; }
        .chip-b { background:#DBEAFE; color:#1E40AF; }
        .divider { border:none; border-top:1px solid #E2E8F0; margin:12px 0; }
        .row-between { display:flex; justify-content:space-between; align-items:center; }

        /* ── ANIMATIONS ──────────────────────────── */
        @keyframes popIn { 0%{transform:scale(1)} 40%{transform:scale(1.18)} 100%{transform:scale(1)} }
        @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-4px)} 40%,80%{transform:translateX(4px)} }
        .pop { animation:popIn 0.3s ease; }
        .slide-up { animation:slideUp 0.25s ease; }
        .shake { animation:shake 0.35s ease; }

        /* ── BOARD RESPONSIVE ───────────────────────── */
        @media (min-width: 580px) {
            .b-panel { max-width:780px; margin:0 auto; }
        }

        /* ════════════════════════════════════════════
           BENTO DASHBOARD
           ════════════════════════════════════════════ */
        .dash-bento {
            padding: 14px;
            display: grid;
            gap: 12px;
            align-items: start;
            grid-template-columns: 1fr 1fr;   /* mobile: 2-col */
        }

        /* ≥ 960px: 4-column bento */
        @media (min-width: 960px) {
            .dash-bento {
                grid-template-columns: 1.35fr 1fr 1.15fr 0.82fr;
                grid-template-rows: auto;
            }
            .db-col2 { display:flex; flex-direction:column; gap:12px; }
            .db-side { display:flex; flex-direction:column; gap:12px; }
        }

        /* mobile: col2 and side children flow into grid */
        @media (max-width: 959px) {
            .db-col2, .db-side { display:contents; }
            .db-card { max-height:340px; overflow-y:auto; }
        }
        @media (max-width: 480px) {
            .dash-bento { grid-template-columns:1fr; }
        }

        /* ── DB CARD BASE ──────────────────────────── */
        .db-card {
            background: white;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.14);
            position: relative;
        }

        .db-card-hdr {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 13px 14px 10px;
            border-bottom: 2px solid #F1F5F9;
            flex-shrink: 0;
        }
        .db-card-ico { font-size:1.25em; flex-shrink:0; }
        .db-ct { font-size:0.97em; font-weight:800; color:#1E293B; flex:1; white-space:nowrap; }
        .db-cs { font-size:0.75em; font-weight:600; color:#64748B; white-space:nowrap; }

        .db-expand {
            background: #EEF2FF; border: none; border-radius:8px;
            padding: 5px 10px; font-size:0.72em; font-weight:700;
            color: #4F46E5; cursor:pointer; transition:var(--t); white-space:nowrap;
        }
        .db-expand:hover  { background:#E0E7FF; }
        .db-expand:active { transform:scale(0.95); }

        /* thin progress strip under header */
        .db-pbar-wrap { background:#F1F5F9; height:4px; }
        .db-pbar-fill { height:100%; background:linear-gradient(90deg,#6366F1,#10B981); transition:width 0.5s ease; }

        /* ── CHORES ────────────────────────────────── */
        .db-blk-hdr {
            display:flex; align-items:center; gap:6px;
            padding: 7px 14px 5px;
            font-size:0.72em; font-weight:800;
            text-transform:uppercase; letter-spacing:0.5px;
        }
        .db-blk-hdr.morning   { background:#FEF9C3; color:#713F12; }
        .db-blk-hdr.afternoon { background:#DBEAFE; color:#1E3A8A; }
        .db-blk-hdr.evening   { background:#EDE9FE; color:#3B0764; }
        .db-blk-pts { margin-left:auto; opacity:0.8; }

        .db-chore-row {
            display:flex; align-items:center; gap:10px;
            padding: 9px 14px;
            border-bottom: 1px solid #F8FAFC;
            cursor:pointer; min-height:44px; user-select:none;
            transition:background 0.12s;
        }
        .db-chore-row:active { background:#F8FAFC; }
        .db-chore-row.done .db-cl { text-decoration:line-through; color:#94A3B8; }
        .db-cb {
            width:24px; height:24px; border-radius:50%;
            border:2.5px solid #CBD5E1;
            display:flex; align-items:center; justify-content:center;
            font-size:0.8em; flex-shrink:0; transition:var(--t);
        }
        .db-chore-row.done .db-cb { background:#10B981; border-color:#10B981; color:white; }
        .db-ci { font-size:1.15em; }
        .db-cl { flex:1; font-size:0.9em; font-weight:600; color:#1E293B; }
        .db-cp { font-size:0.7em; font-weight:700; color:#D97706; background:#FEF3C7; padding:2px 7px; border-radius:20px; flex-shrink:0; }

        /* ── HOMEWORK ──────────────────────────────── */
        .db-hw-row {
            display:flex; align-items:flex-start; gap:10px;
            padding:10px 14px; border-bottom:1px solid #F8FAFC;
            cursor:pointer; transition:background 0.12s; min-height:46px;
        }
        .db-hw-row:active { background:#F8FAFC; }
        .db-hw-cb {
            width:22px; height:22px; border-radius:6px;
            border:2.5px solid #CBD5E1; flex-shrink:0; margin-top:3px;
            display:flex; align-items:center; justify-content:center;
            font-size:0.78em; transition:var(--t);
        }
        .db-hw-row.done .db-hw-cb { background:#10B981; border-color:#10B981; color:white; }
        .db-hw-info { flex:1; min-width:0; }
        .db-hw-subj { display:inline-block; padding:1px 7px; border-radius:20px; font-size:0.68em; font-weight:700; margin-bottom:2px; }
        .db-hw-title { font-size:0.87em; font-weight:700; color:#1E293B; }
        .db-hw-row.done .db-hw-title { text-decoration:line-through; color:#94A3B8; }
        .db-hw-due  { font-size:0.7em; color:#64748B; margin-top:2px; }
        .db-hw-due.urgent  { color:#EF4444; font-weight:700; }
        .db-hw-due.warning { color:#F97316; font-weight:700; }
        .db-pomo-launch {
            background:#FFF7ED; border:1.5px solid #FED7AA; border-radius:8px;
            padding:5px 9px; font-size:0.72em; font-weight:700; color:#C2410C;
            cursor:pointer; flex-shrink:0; transition:var(--t); align-self:center;
        }
        .db-pomo-launch:active { transform:scale(0.93); }
        .db-add-row { padding:9px 14px; border-top:1px solid #F1F5F9; }

        /* ── MINI POMODORO ─────────────────────────── */
        .db-pomo-mini {
            background:linear-gradient(135deg,#1E293B,#334155);
            color:white; padding:11px 14px;
            display:flex; align-items:center; gap:12px;
        }
        .db-pomo-mini.hidden-pomo { display:none; }
        .db-pomo-info  { flex:1; min-width:0; }
        .db-pomo-label { font-size:0.65em; color:#94A3B8; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
        .db-pomo-subj  { font-size:0.82em; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .db-pomo-mode  { font-size:0.65em; color:#94A3B8; margin-top:1px; }
        .db-pomo-time  { font-size:1.55em; font-weight:800; color:#F97316; font-variant-numeric:tabular-nums; flex-shrink:0; }
        .db-pomo-ctrl  { display:flex; gap:5px; flex-shrink:0; }
        .db-pmb { padding:5px 11px; border:none; border-radius:8px; font-weight:700; font-size:0.8em; cursor:pointer; transition:var(--t); }
        .db-pmb:active { transform:scale(0.94); }
        .db-pmb-p { background:#F59E0B; color:white; }
        .db-pmb-r { background:#374151; color:#9CA3AF; }

        /* ── HABITS ────────────────────────────────── */
        .db-habit-block { padding:11px 14px; border-bottom:1px solid #F8FAFC; }
        .db-habit-top { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
        .db-h-ico  { font-size:1.45em; flex-shrink:0; }
        .db-h-meta { flex:1; min-width:0; }
        .db-h-name { font-size:0.9em; font-weight:700; color:#1E293B; }
        .db-h-sub  { font-size:0.68em; color:#64748B; }
        .db-h-streak { font-size:0.7em; font-weight:700; background:#FEF3C7; color:#78350F; padding:2px 8px; border-radius:20px; flex-shrink:0; }
        .db-h-today-btn {
            padding:5px 11px; border-radius:8px;
            border:2px solid #E2E8F0; background:white;
            font-size:0.75em; font-weight:700; color:#475569;
            cursor:pointer; transition:var(--t); flex-shrink:0;
        }
        .db-h-today-btn.done { background:#DCFCE7; border-color:#10B981; color:#166534; }
        .db-h-today-btn:active { transform:scale(0.94); }

        .db-week-row { display:flex; gap:4px; margin-bottom:6px; }
        .db-hd {
            flex:1; height:28px; border-radius:6px;
            border:2px solid #E2E8F0; background:#F8FAFC;
            display:flex; align-items:center; justify-content:center;
            font-size:0.67em; font-weight:700; color:#94A3B8;
            cursor:pointer; transition:var(--t);
        }
        .db-hd.done   { background:#10B981; border-color:#10B981; color:white; }
        .db-hd.today  { border-color:#6366F1; color:#6366F1; }
        .db-hd.today.done { border-color:#10B981; color:white; }
        .db-hd.future { opacity:0.28; pointer-events:none; }

        .db-h-counter { display:flex; align-items:center; gap:7px; }
        .db-h-cntr-lbl { flex:1; font-size:0.75em; color:#64748B; font-weight:600; }
        .db-cntr-btn {
            width:30px; height:30px; border:2px solid #E2E8F0; background:white;
            border-radius:7px; font-size:1.1em; cursor:pointer; font-weight:700;
            display:flex; align-items:center; justify-content:center; transition:var(--t);
        }
        .db-cntr-btn:active { background:#F1F5F9; transform:scale(0.93); }
        .db-cntr-val { font-size:1.05em; font-weight:800; color:#1E293B; min-width:26px; text-align:center; }

        /* ── MOOD ──────────────────────────────────── */
        .db-mood-row { display:flex; gap:5px; padding:11px 13px 7px; }
        .db-mood-btn {
            flex:1; border:3px solid #E2E8F0; background:white;
            border-radius:12px; padding:8px 3px;
            display:flex; flex-direction:column; align-items:center; gap:3px;
            cursor:pointer; transition:var(--t);
        }
        .db-mood-btn:active { transform:scale(0.93); }
        .db-mood-btn.selected { border-color:#6366F1; background:#EEF2FF; transform:scale(1.05); }
        .db-me { font-size:1.45em; }
        .db-ml { font-size:0.6em; font-weight:700; color:#64748B; text-align:center; line-height:1.2; }
        .db-mood-btn.selected .db-ml { color:#4F46E5; }
        .db-mood-hist { display:flex; padding:5px 13px 11px; gap:5px; }
        .db-mh-item { flex:1; text-align:center; }
        .db-mh-em  { font-size:1.15em; }
        .db-mh-day { font-size:0.58em; color:#94A3B8; font-weight:700; }
        .db-mood-set { padding:0 13px 10px; font-size:0.75em; color:#94A3B8; text-align:center; }

        /* ── GUJARATI ──────────────────────────────── */
        .db-guj-info { display:flex; align-items:center; gap:10px; padding:10px 14px 7px; }
        .db-guj-phase { font-size:1.1em; font-weight:800; color:#6366F1; }
        .db-guj-subtext { font-size:0.75em; color:#64748B; margin-top:2px; }
        .db-guj-pbar { margin:0 14px 4px; background:#F1F5F9; border-radius:6px; height:5px; overflow:hidden; }
        .db-guj-pfill { height:100%; background:linear-gradient(90deg,#6366F1,#8B5CF6); border-radius:6px; transition:width 0.4s; }
        .db-guj-plbl { text-align:center; font-size:0.68em; color:#64748B; margin-bottom:9px; }
        .db-guj-acts { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; padding:0 12px 12px; }
        .db-guj-btn {
            background:#F8FAFC; border:2px solid #E2E8F0; border-radius:10px;
            padding:9px 5px; text-align:center; cursor:pointer;
            text-decoration:none; display:block; transition:var(--t);
        }
        .db-guj-btn:hover  { border-color:#6366F1; background:#EEF2FF; }
        .db-guj-btn:active { transform:scale(0.95); }
        .db-guj-bi { font-size:1.4em; display:block; }
        .db-guj-bl { font-size:0.68em; font-weight:700; color:#1E293B; margin-top:3px; }

        /* ── POINTS ────────────────────────────────── */
        .db-pts-inner  { padding:12px 14px; }
        .db-pts-tier   { display:flex; align-items:center; gap:9px; margin-bottom:9px; }
        .db-pts-t-ico  { font-size:1.9em; }
        .db-pts-t-name { font-size:0.95em; font-weight:800; color:#1E293B; }
        .db-pts-t-sub  { font-size:0.72em; color:#64748B; }
        .db-pts-row    { display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px; margin-bottom:9px; }
        .db-pts-stat   { text-align:center; background:#F8FAFC; border-radius:9px; padding:7px 4px; }
        .db-pts-val    { font-size:1em; font-weight:800; color:#1E293B; }
        .db-pts-lbl    { font-size:0.62em; color:#64748B; font-weight:600; }
        .db-pts-bar    { background:#E2E8F0; border-radius:8px; height:6px; overflow:hidden; }
        .db-pts-bfill  { height:100%; background:linear-gradient(90deg,#6366F1,#8B5CF6); border-radius:8px; transition:width 0.5s; }
        .db-pts-next-lbl { display:flex; justify-content:space-between; font-size:0.7em; font-weight:700; color:#64748B; margin-bottom:4px; }
        .db-pts-card   { cursor:pointer; }
        .db-pts-card:hover { box-shadow:0 4px 24px rgba(99,102,241,0.22); }

        /* ── CALENDAR (dashboard) ──────────────────── */
        .db-ev-row { display:flex; align-items:center; gap:9px; padding:8px 14px; border-bottom:1px solid #F8FAFC; }
        .db-ev-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
        .db-ev-info { flex:1; min-width:0; }
        .db-ev-title { font-size:0.85em; font-weight:700; color:#1E293B; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .db-ev-when  { font-size:0.68em; color:#64748B; }
        .db-today-tag { background:#6366F1; color:white; font-size:0.6em; font-weight:800; padding:1px 6px; border-radius:10px; flex-shrink:0; }

        /* ── KUNG FU (dashboard) ───────────────────── */
        .db-kf-goals { display:grid; grid-template-columns:1fr 1fr 1fr; gap:7px; padding:11px 13px 8px; }
        .db-kf-goal {
            background:#F8FAFC; border:2.5px solid #E2E8F0; border-radius:12px;
            padding:10px 6px; text-align:center; cursor:pointer; transition:var(--t);
        }
        .db-kf-goal.done { background:#ECFDF5; border-color:#10B981; }
        .db-kf-goal:active { transform:scale(0.95); }
        .db-kf-ico { font-size:1.4em; margin-bottom:3px; }
        .db-kf-lbl { font-size:0.72em; font-weight:700; color:#1E293B; }
        .db-kf-sub { font-size:0.62em; color:#64748B; margin-top:1px; }
        .db-kf-goal.done .db-kf-lbl { color:#059669; }
        .db-kf-goal.done .db-kf-ico::after { content:' ✓'; font-size:0.6em; }

        .db-mini-fc {
            margin:0 13px 9px;
            background:linear-gradient(135deg,#1E293B,#334155);
            border-radius:12px; padding:12px 14px;
            cursor:pointer; color:white; min-height:66px;
            display:flex; flex-direction:column; justify-content:center;
            transition:var(--t); user-select:none;
        }
        .db-mini-fc:active { transform:scale(0.98); }
        .db-fc-badge { font-size:0.6em; color:#94A3B8; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:5px; }
        .db-fc-term    { font-size:1.1em; font-weight:800; }
        .db-fc-hint    { font-size:0.66em; color:#94A3B8; margin-top:3px; }
        .db-fc-meaning { font-size:0.84em; line-height:1.4; color:#6EE7B7; }

function getMondayOfWeek(dateStr) {
    const d = new Date(dateStr + 'T12:00:00');

    const diff = day === 0 ? -6 : 1 - day;
    d.setDate(d.getDate() + diff);

  // ========== GEOGRAPHY (15) ==========

  {id:'animal_001',category:'Animals',q:'What is the fastest land animal?',a:'Cheetah',hint:'A big cat',funFact:'Cheetahs can run up to 70 mph! They have special claws like running cleats.',links:{correct:'https://www.britannica.com/animal/cheetah',incorrect:'https://www.britannica.com/animal/Lion'}},
  {id:'animal_002',category:'Animals',q:'How many legs does an octopus have?',a:'8',hint:'The name says it',funFact:'Each tentacle has 200-300 suckers! Octopuses are highly intelligent.',links:{correct:'https://www.britannica.com/animal/octopus',incorrect:'https://www.britannica.com/animal/squid'}},

  {id:'animal_005',category:'Animals',q:'What bird can fly backwards?',a:'Hummingbird',hint:'Drinks nectar from flowers',funFact:'Hummingbirds are the only birds that can fly backwards! Their wings beat 50-80 times per second.',links:{correct:'https://www.britannica.com/animal/hummingbird',incorrect:'https://www.britannica.com/animal/dove'}},
  {id:'animal_006',category:'Animals',q:'How long can a polar bear swim without stopping?',a:'6 days',hint:'Measured in days',funFact:'Polar bears are incredible swimmers and travel hundreds of miles across ocean!',links:{correct:'https://www.britannica.com/animal/polar-bear',incorrect:'https://www.britannica.com/animal/walrus'}},

function addDays(dateStr, days) {
    const d = new Date(dateStr + 'T12:00:00');
    d.setDate(d.getDate() + days);
    return d.toISOString().split('T')[0];
}

function loadState() {
    try {
        const raw = localStorage.getItem(LS_KEY);
        if (raw) {
            state = JSON.parse(raw);
            applyResets();
            return;
        }
    } catch (e) { console.warn('State parse error', e); }
    state = buildDefaultState();
    applyResets();
    saveState();
}

function saveState() {
    localStorage.setItem(LS_KEY, JSON.stringify(state));
}

function applyResets() {
    const today = todayStr();
    const weekStart = getMondayOfWeek(today);
    const month = today.slice(0, 7);

    // Daily reset
    if (state.date !== today) {
        // Reset chore completion
        ['morning','afternoon','evening'].forEach(block => {
            state.chores[block].forEach(c => { c.done = false; });
        });
        // Reset daily points (carry week/month/total)
        state.points.today = 0;
        // Reset Kung Fu daily goals
        state.kungfu.todayPractice   = false;
        state.kungfu.todayFlashcards = false;
        state.kungfu.todayStudy      = false;
        state.kungfu.practiceMinutes = 0;
        state.kungfu.studyMinutes    = 0;
        // Reset mood today
        state.mood.today = null;
        // Reset Gujarati daily timer
        state.gujarati.todayMinutes = 0;
        state.gujarati.timerRunning = false;
        state.gujarati.timerStart   = null;
        // Stop any running pomodoro
        state.pomodoro = null;
        // Reset habit today flags
        Object.values(state.habits).forEach(h => {
            h.todayDone = false;
            if (h.todayCount !== undefined) h.todayCount = 0;
            if (h.todayGlasses !== undefined) h.todayGlasses = 0;
        });
        // Reading: reset daily minutes
        if (state.reading) {
            state.reading.dailyMinutes = 0;
        }
        state.date = today;
    }

    // Trivia: check streak, reset daily flag, and ensure question is set (always, not just on daily reset)
    if (state.trivia) {
        const lastDate = state.trivia.lastAnsweredDate;
        const prevDay = addDays(today, -1);
        if (state.date !== today && lastDate !== today) {
            if (lastDate !== prevDay) {
                state.trivia.streak = 0; // streak broken
            }
            state.trivia.todayAnswered = false;
        }
        // Always ensure we have a question for today
        if (!state.trivia.currentQuestion) {
            state.trivia.currentQuestion = getTriviaQuestion(today);
        }
    }

    // Weekly reset
    if (state.weekStart !== weekStart) {
        Object.values(state.habits).forEach(h => { h.weekDays = []; });
        // Reading: reset weekly minutes and log the previous week
        if (state.reading) {
            if (state.reading.weeklyMinutes > 0) {
                if (!state.reading.history) state.reading.history = [];
                state.reading.history.push({
                    week: state.weekStart,
                    minutes: state.reading.weeklyMinutes
                });
            }
            state.reading.weeklyMinutes = 0;
        }
        state.weekStart = weekStart;
    }

    // Monthly reset
    if (state.month !== month) {
        state.points.month = 0;
        state.month = month;
    }
}

    currentTab = tab;
    document.querySelectorAll('.b-tab').forEach(btn => {

    });
    document.querySelectorAll('.b-panel').forEach(panel => {

    });
    const panel = document.getElementById('panel-' + tab);

    const activeTab = document.querySelector('.b-tab.active');
    if (activeTab) activeTab.scrollIntoView({ inline:'nearest', behavior:'smooth' });

    // Render specific panel
    switch(tab) {

function h(tag, cls, html) {
    return `<${tag} class="${cls}">${html}</${tag}>`;
}

function formatDate(dateStr) {
    const d = new Date(dateStr + 'T12:00:00');
    return d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' });
}

function getDayLabel(dateStr) {
    const d = new Date(dateStr + 'T12:00:00');
    return d.toLocaleDateString('en-GB', { weekday:'short' });
}

function getDayNum(dateStr) {
    return new Date(dateStr + 'T12:00:00').getDate();
}

function getMonthLabel(dateStr) {
    return new Date(dateStr + 'T12:00:00').toLocaleDateString('en-GB', { month:'short' });
}

function getDueStatus(dueDate) {
    const today = todayStr();
    if (dueDate < today) return { text:'Overdue!', cls:'urgent' };
    if (dueDate === today) return { text:'Due today!', cls:'urgent' };
    const diff = Math.round((new Date(dueDate + 'T12:00:00') - new Date(today + 'T12:00:00')) / 86400000);
    if (diff === 1) return { text:'Due tomorrow', cls:'warning' };
    return { text:'Due ' + formatDate(dueDate), cls:'' };
}

function getTier(monthlyPts) {
    return TIER_LEVELS.find(t => monthlyPts >= t.min) || TIER_LEVELS[TIER_LEVELS.length - 1];
}

function getNextTier(monthlyPts) {
    const tiers = [...TIER_LEVELS].reverse();
    for (let i = 0; i < tiers.length; i++) {
        if (monthlyPts < tiers[i].min) return tiers[i];
    }
    return null;
}

function allChoresCount() {
    return Object.values(state.chores).flat();
}

function doneChoresCount() {
    return allChoresCount().filter(c => c.done).length;
}

function getWeekDayGrid() {
    const today = todayStr();
    const monday = getMondayOfWeek(today);
    const days = [];
    for (let i = 0; i < 7; i++) {
        days.push(addDays(monday, i));
    }
    return days;
}

function uid() {
    return 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
}

function addPoints(pts) {
    state.points.today += pts;
    state.points.week  += pts;
    state.points.month += pts;
    state.points.total += pts;
    saveState();
    updateBoardHeader();
    // Animate badge
    const el = document.getElementById('board-pts-chip');
    if (el) { el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop'); }
}

function subtractPoints(pts) {
    state.points.today = Math.max(0, state.points.today - pts);
    state.points.week  = Math.max(0, state.points.week  - pts);
    state.points.month = Math.max(0, state.points.month - pts);
    state.points.total = Math.max(0, state.points.total - pts);
    saveState();
    updateBoardHeader();
}

function playTick() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.frequency.value = 880;
        g.gain.value = 0.15;
        osc.start(); osc.stop(ctx.currentTime + 0.08);
    } catch(e) {}
}

function playDone() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [523, 659, 784].forEach((freq, i) => {
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.connect(g); g.connect(ctx.destination);
            osc.frequency.value = freq;
            g.gain.value = 0.2;
            osc.start(ctx.currentTime + i * 0.12);
            osc.stop(ctx.currentTime + i * 0.12 + 0.15);
        });
    } catch(e) {}
}

// ── Dashboard: Chores ──────────────────────────────
function renderDashChores() {
    const all  = allChoresCount();
    const done = doneChoresCount();
    const pct  = all.length ? (done / all.length * 100) : 0;
    const pts  = all.filter(c => c.done).reduce((s,c) => s + c.pts, 0);

    const sumEl = document.getElementById('db-chores-summary');
    if (sumEl) sumEl.textContent = done + '/' + all.length + ' · ' + pts + ' pts';
    const barEl = document.getElementById('db-chores-bar');
    if (barEl) barEl.style.width = pct.toFixed(0) + '%';

    const BLOCKS = [
        { key:'morning',   label:'🌅 Morning',  cls:'morning'   },
        { key:'afternoon', label:'☀️ Afternoon', cls:'afternoon' },
        { key:'evening',   label:'🌙 Evening',   cls:'evening'   },
    ];
    let html = '';
    BLOCKS.forEach(b => {
        const ch = state.chores[b.key];
        const bd = ch.filter(c => c.done).length;
        html += `<div class="db-blk-hdr ${b.cls}">${b.label}<span class="db-blk-pts">${bd}/${ch.length}</span></div>`;
        ch.forEach(c => {
            html += `<div class="db-chore-row ${c.done?'done':''}" onclick="toggleChore('${b.key}','${c.id}')">
                <div class="db-cb">${c.done ? '✓' : ''}</div>
                <span class="db-ci">${c.icon}</span>
                <span class="db-cl">${c.text}</span>
                <span class="db-cp">+${c.pts}</span>
            </div>`;
        });
    });
    const el = document.getElementById('db-chores-content');
    if (el) el.innerHTML = html;
}

// ── Dashboard: Homework ────────────────────────────
function renderDashHomework() {
    const pending  = state.homework.filter(h => !h.done);
    const complete = state.homework.filter(h => h.done);

    const sumEl = document.getElementById('db-hw-summary');
    if (sumEl) sumEl.textContent = pending.length > 0 ? pending.length + ' pending' : 'All done! 🎉';

    let html = '';
    if (pending.length === 0 && complete.length === 0) {
        html = `<div style="padding:16px;text-align:center;color:#94A3B8;font-size:0.85em">No assignments yet</div>`;
    }
    pending.forEach(hw => {
        const due    = getDueStatus(hw.dueDate);
        const colors = SUBJECT_COLORS[hw.subject] || SUBJECT_COLORS.Other;
        html += `<div class="db-hw-row" onclick="toggleHomework('${hw.id}')">
            <div class="db-hw-cb"></div>
            <div class="db-hw-info">
                <span class="db-hw-subj" style="background:${colors.bg};color:${colors.color}">${hw.subject}</span>
                <div class="db-hw-title">${hw.title}</div>
                <div class="db-hw-due ${due.cls}">${due.text}${hw.pomodorosUsed > 0 ? ' · 🍅×'+hw.pomodorosUsed : ''}</div>
            </div>
            <button class="db-pomo-launch" onclick="event.stopPropagation();startPomodoro('${hw.id}')">🍅</button>
        </div>`;
    });
    complete.forEach(hw => {
        const colors = SUBJECT_COLORS[hw.subject] || SUBJECT_COLORS.Other;
        html += `<div class="db-hw-row done" onclick="toggleHomework('${hw.id}')">
            <div class="db-hw-cb">✓</div>
            <div class="db-hw-info">
                <span class="db-hw-subj" style="background:${colors.bg};color:${colors.color}">${hw.subject}</span>
                <div class="db-hw-title">${hw.title}</div>
                <div class="db-hw-due">Done ✓</div>

    });

    const el = document.getElementById('db-hw-content');
    if (el) el.innerHTML = html;
}

// Pomodoro
function renderPomoWidget() {
    if (!state.pomodoro) return '';
    const p = state.pomodoro;
    const hw = state.homework.find(h => h.id === p.hwId);
    const R = 51;
    const C = 2 * Math.PI * R;
    const pct = p.remaining / p.total;
    const offset = C * (1 - pct);
    const mins = String(Math.floor(p.remaining / 60)).padStart(2,'0');
    const secs = String(p.remaining % 60).padStart(2,'0');
    const modeLabel = p.mode === 'work' ? 'Focus Time 🎯' : 'Break Time ☕';

    return `
        <div class="pomo-for">Pomodoro Timer</div>
        <div class="pomo-subj-lbl">${hw ? hw.title : 'Study Session'}</div>
        <div class="pomo-ring">
            <svg viewBox="0 0 120 120">
                <circle class="r-bg" cx="60" cy="60" r="${R}"/>
                <circle class="r-fill" id="pomo-ring-fill" cx="60" cy="60" r="${R}"
                    stroke-dasharray="${C.toFixed(2)}"
                    stroke-dashoffset="${offset.toFixed(2)}"
                    stroke="${p.mode === 'work' ? '#F97316' : '#10B981'}"/>
            </svg>
            <div class="pomo-time" id="pomo-time-display">${mins}:${secs}</div>
        </div>
        <div class="pomo-mode-lbl" id="pomo-mode-lbl">${modeLabel}</div>
        <div class="pomo-btns">
            ${p.active
                ? `<button class="pb pb-pause" onclick="pausePomodoro()">⏸ Pause</button>`
                : `<button class="pb pb-start" onclick="resumePomodoro()">▶ ${p.remaining === p.total ? 'Start' : 'Resume'}</button>`
            }
            <button class="pb pb-reset" onclick="resetPomodoro()">↺ Reset</button>
        </div>
    `;
}

function startPomodoro(hwId) {
    if (_pomoInterval) clearInterval(_pomoInterval);
    state.pomodoro = { hwId, mode:'work', remaining:25*60, total:25*60, active:true };
    saveState();
    // If already on the board show the full panel; if on dashboard surface the mini widget
    if (document.getElementById('view-board').classList.contains('active')) {
        switchTab('homework');
    } else {
        renderDashPomoMini();
    }
    startPomoInterval();
}

function resumePomodoro() {
    if (!state.pomodoro) return;
    state.pomodoro.active = true;
    saveState();
    startPomoInterval();
    updatePomoDisplay();
}

function pausePomodoro() {
    if (!state.pomodoro) return;
    state.pomodoro.active = false;
    clearInterval(_pomoInterval);
    _pomoInterval = null;
    saveState();
    updatePomoDisplay();
}

function resetPomodoro() {
    clearInterval(_pomoInterval);
    _pomoInterval = null;
    state.pomodoro = null;
    saveState();
    renderHomeworkPanel();
    renderDashPomoMini();
}

function startPomoInterval() {
    if (_pomoInterval) clearInterval(_pomoInterval);
    _pomoInterval = setInterval(tickPomo, 1000);
}

function tickPomo() {
    if (!state.pomodoro || !state.pomodoro.active) return;
    state.pomodoro.remaining--;

    if (state.pomodoro.remaining <= 0) {
        if (state.pomodoro.mode === 'work') {
            // Work session done
            const hw = state.homework.find(h => h.id === state.pomodoro.hwId);
            if (hw) { hw.pomodorosUsed++; addPoints(15); }
            playDone();
            state.pomodoro.mode = 'break';
            state.pomodoro.remaining = 5 * 60;
            state.pomodoro.total = 5 * 60;
        } else {
            // Break done
            playDone();
            clearInterval(_pomoInterval);
            _pomoInterval = null;
            state.pomodoro.active = false;
            state.pomodoro.mode = 'work';
            state.pomodoro.remaining = 25 * 60;
            state.pomodoro.total = 25 * 60;
        }
    }

    saveState();
    updatePomoDisplay();
}

function updatePomoDisplay() {
    if (!state.pomodoro) return;
    const p = state.pomodoro;
    const R = 51;
    const C = 2 * Math.PI * R;
    const offset = C * (1 - p.remaining / p.total);
    const mins = String(Math.floor(p.remaining / 60)).padStart(2,'0');
    const secs = String(p.remaining % 60).padStart(2,'0');

    const widget = document.getElementById('pomo-widget');
    if (!widget) return;
    widget.classList.remove('hidden');

    const timeEl = document.getElementById('pomo-time-display');
    const ringEl = document.getElementById('pomo-ring-fill');
    const modeEl = document.getElementById('pomo-mode-lbl');

    if (timeEl) timeEl.textContent = mins + ':' + secs;
    if (ringEl) {
        ringEl.setAttribute('stroke-dashoffset', offset.toFixed(2));
        ringEl.setAttribute('stroke', p.mode === 'work' ? '#F97316' : '#10B981');
    }
    if (modeEl) modeEl.textContent = p.mode === 'work' ? 'Focus Time 🎯' : 'Break Time ☕';

    // Refresh start/pause button
    const btns = widget.querySelector('.pomo-btns');
    if (btns) {
        const first = btns.firstElementChild;
        if (p.active) {
            if (first.classList.contains('pb-start')) {
                first.className = 'pb pb-pause';
                first.innerHTML = '⏸ Pause';
                first.onclick = pausePomodoro;
            }
        } else {
            if (first.classList.contains('pb-pause')) {
                first.className = 'pb pb-start';
                first.innerHTML = '▶ Resume';
                first.onclick = resumePomodoro;
            }
        }
    }

    // Also update dashboard mini timer (lightweight — just the number)
    const dashTime = document.getElementById('db-pomo-time');
    if (dashTime) dashTime.textContent = mins + ':' + secs;
}

function checkTriviaAnswer() {
    const input = document.getElementById('trivia-answer');
    const wrongDiv = document.getElementById('trivia-wrong');
    if (!input || !state.trivia?.currentQuestion) return;

    const answer = input.value.trim().toLowerCase();
    const correct = state.trivia.currentQuestion.a.toLowerCase();

    if (answer === correct) {
        // Correct!
        state.trivia.todayAnswered = true;
        state.trivia.totalAnswered = (state.trivia.totalAnswered || 0) + 1;
        state.trivia.lastAnsweredDate = todayStr();

        // Increment streak (checked on daily reset in applyResets)
        if (!state.trivia.streak) state.trivia.streak = 1;
        else state.trivia.streak += 1;

        addPoints(5);
        playTick();
        saveState();
        renderTriviaPanel();
    } else {
        // Wrong - show feedback and learning resources
        input.style.borderColor = '#EF4444';
        input.style.backgroundColor = '#4400001A';

        if (wrongDiv) {
            wrongDiv.style.display = 'block';
        }

        // Show correct answer after a brief moment
        setTimeout(() => {
            if (wrongDiv) {
                wrongDiv.innerHTML = `
                    <div style="font-weight:600;margin-bottom:8px">The answer was: <strong>${state.trivia.currentQuestion.a}</strong></div>
                    <div style="font-size:0.9em;margin-bottom:12px;color:#FCA5A5">Keep learning and try again tomorrow!</div>
                    ${state.trivia.currentQuestion.links && state.trivia.currentQuestion.links.incorrect ? `
                        <a href="${state.trivia.currentQuestion.links.incorrect}" target="_blank" style="display:inline-block;padding:8px 14px;background:#EF4444;color:white;text-decoration:none;border-radius:6px;font-size:0.85em;font-weight:600;transition:0.2s" onmouseover="this.style.background='#DC2626'" onmouseout="this.style.background='#EF4444'">
                            📚 Learn This Topic
                        </a>
                    ` : ''}
                `;
            }
        }, 800);
    }
}

function addReadingMinutes(minutes) {
    state.reading.dailyMinutes = (state.reading.dailyMinutes || 0) + minutes;
    state.reading.weeklyMinutes = (state.reading.weeklyMinutes || 0) + minutes;
    addPoints(Math.ceil(minutes / 5)); // 1 pt per 5 min
    playTick();
    saveState();
    renderBoardReading();
    renderDashboard();
}

function addReadingCustom() {
    const input = document.getElementById('reading-custom-input');
    const val = parseInt(input.value);
    if (val > 0 && val <= 120) {
        addReadingMinutes(val);
        input.value = '';

function toggleKFGoal(type) {
    const kf = state.kungfu;
    if (type === 'practice')   { kf.todayPractice   = !kf.todayPractice;   if (kf.todayPractice)   { addPoints(10); playTick(); } else subtractPoints(10); }
    if (type === 'flashcards') { kf.todayFlashcards = !kf.todayFlashcards; if (kf.todayFlashcards) { addPoints(5);  playTick(); } else subtractPoints(5);  }

    renderKungFuPanel();

    state.kungfu.practiceLog.push({ date: todayStr(), duration: dur });
